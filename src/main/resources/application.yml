spring:
  application:
    name: badminton-system

  # ===== Database (MS SQL Server) =====
  # Do NOT put real passwords here!
  # Create your own application-local.yml (see README)
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=BadmintonDB;encrypt=false;trustServerCertificate=true
    username: sa
    password: BadmintonDB2026!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        format_sql: true

  # ===== Thymeleaf =====
  thymeleaf:
    cache: false

server:
  port: 8080
