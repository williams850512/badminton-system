<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>訂單明細</title>
</head>
<body>
    <h1>訂單明細</h1>
    <div th:if="${order != null}">
        <p><strong>訂單ID:</strong> <span th:text="${order.orderId}"></span></p>
        <p><strong>會員ID:</strong> <span th:text="${order.memberId}"></span></p>
        <p><strong>總金額:</strong> <span th:text="${order.totalAmount}"></span></p>
        <p><strong>狀態:</strong> <span th:text="${order.status}"></span></p>
        <p><strong>時間:</strong> <span th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm:ss')}"></span></p>
        
        <h2>明細項目</h2>
        <table border="1">
            <thead>
                <tr>
                    <th>明細ID</th>
                    <th>商品ID</th>
                    <th>數量</th>
                    <th>單價</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.orderItemId}"></td>
                    <td th:text="${item.productId}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.unitPrice}"></td>
                </tr>
                <tr th:if="${items.empty}">
                    <td colspan="4">目前沒有明細</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div th:if="${order == null}">
        <p>找不到該訂單</p>
    </div>
    <br/>
    <a th:href="@{/admin/orders}">返回列表</a>
</body>
</html>
