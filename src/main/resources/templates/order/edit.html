<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改訂單</title>
</head>
<body>
    <h1>修改訂單</h1>
    <form th:action="@{/admin/orders/update/{id}(id=${order.orderId})}" method="post">
        <div>
            <label>訂單ID:</label>
            <span th:text="${order.orderId}"></span>
        </div>
        <div>
            <label>會員ID:</label>
            <span th:text="${order.memberId}"></span>
        </div>
        <div>
            <label>總金額:</label>
            <span th:text="${order.totalAmount}"></span>
        </div>
        <div>
            <label>狀態:</label>
            <!-- 動態產生下拉選單，並自動選中目前的狀態 -->
            <select name="status">
                <option th:each="s : ${statuses}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${s == order.status}">
                </option>
            </select>
        </div>
        <div>
            <label>付款方式:</label>
            <input type="text" name="paymentType" th:value="${order.paymentType}" />
        </div>
        <div>
            <label>備註:</label>
            <textarea name="note" th:text="${order.note}"></textarea>
        </div>
        <button type="submit">儲存修改</button>
        <a th:href="@{/admin/orders}">取消返回列表</a>
    </form>
</body>
</html>
