<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    ============================================================
    訂單管理 CRUD 頁面（RESTful AJAX 版）
    ============================================================
-->
<head th:replace="~{layout/backend :: head('訂單管理')}"></head>
<body>

    <!-- ===== Header 導覽列 ===== -->
    <nav th:replace="~{layout/backend :: header}"></nav>

    <div class="d-flex">
        <!-- ===== Sidebar 側邊欄 ===== -->
        <aside th:replace="~{layout/backend :: sidebar}"></aside>

        <!-- ===== 主內容區 ===== -->
        <main class="main-content">
            <div class="page-header">
                <h2><i class="bi bi-receipt"></i> 訂單管理</h2>
                <div class="d-flex gap-2">
                    <div class="input-group" style="width: 300px;">
                        <input type="text" class="form-control" id="searchKeyword"
                               placeholder="搜尋會員、付款方式...">
                        <button class="btn btn-outline-secondary" onclick="searchData()">
                            <i class="bi bi-search"></i>
                        </button>
                        <button class="btn btn-outline-danger" onclick="clearSearch()" title="清除搜尋">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <button class="btn btn-primary" onclick="openCreateModal()">
                        <i class="bi bi-plus-lg"></i> 新增訂單
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="orderTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th><th>會員</th><th>總金額</th>
                                <th>狀態</th><th>付款方式</th><th>訂單時間</th>
                                <th style="width: 220px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="7"><div class="spinner-border spinner-border-sm text-primary"></div> 載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- ===== Footer ===== -->
    <footer th:replace="~{layout/backend :: footer}"></footer>

    <!-- ===== 新增訂單 Modal ===== -->
    <div class="modal fade" id="orderModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增訂單</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="orderForm">
                        <input type="hidden" id="editId">
                        <input type="hidden" id="memberId">

                        <!-- 會員搜尋 -->
                        <div class="mb-3">
                            <label class="form-label">會員 <span class="text-danger">*</span></label>
                            <div class="position-relative">
                                <input type="text" class="form-control" id="memberSearch"
                                       placeholder="輸入姓名或手機搜尋會員" autocomplete="off">
                                <div id="memberSearchResults" class="list-group position-absolute w-100 shadow"
                                     style="z-index: 1060; max-height: 200px; overflow-y: auto; display: none;"></div>
                            </div>
                            <small id="memberSelectedInfo" class="text-success"></small>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label for="paymentType" class="form-label">付款方式</label>
                                <select class="form-select" id="paymentType">
                                    <option value="">請選擇</option>
                                    <option value="CASH">現金</option>
                                    <option value="CREDIT_CARD">信用卡</option>
                                    <option value="TRANSFER">轉帳</option>
                                    <option value="LINE_PAY">Line Pay</option>
                                </select>
                            </div>
                            <div class="col-6 mb-3">
                                <label for="note" class="form-label">備註</label>
                                <input type="text" class="form-control" id="note" placeholder="選填">
                            </div>
                        </div>

                        <hr class="cart-section">
                        <!-- 商品選擇區 -->
                        <label class="form-label fw-bold cart-section"><i class="bi bi-cart-plus"></i> 加入商品</label>
                        <div class="row g-2 mb-3 cart-section">
                            <div class="col-6">
                                <select class="form-select form-select-sm" id="selectProduct">
                                    <option value="">載入中...</option>
                                </select>
                            </div>
                            <div class="col-3">
                                <input type="number" class="form-control form-control-sm" id="selectQty"
                                       value="1" min="1" placeholder="數量">
                            </div>
                            <div class="col-3">
                                <button type="button" class="btn btn-success btn-sm w-100" onclick="addToCart()">
                                    <i class="bi bi-plus-lg"></i> 加入
                                </button>
                            </div>
                        </div>

                        <!-- 購物明細表 -->
                        <table class="table table-sm table-bordered mb-2 cart-section" id="cartTable">
                            <thead class="table-light">
                                <tr>
                                    <th>商品</th><th>單價</th><th style="width:80px">數量</th><th>小計</th><th style="width:50px"></th>
                                </tr>
                            </thead>
                            <tbody id="cartBody">
                                <tr><td colspan="5" class="text-center text-muted">尚未加入商品</td></tr>
                            </tbody>
                            <tfoot>
                                <tr class="table-warning">
                                    <td colspan="3" class="text-end fw-bold">合計</td>
                                    <td colspan="2" class="fw-bold" id="cartTotal">$0</td>
                                </tr>
                            </tfoot>
                        </table>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveOrder()">
                        <i class="bi bi-check-lg"></i> 送出訂單
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 共用 Scripts ===== -->
    <div th:replace="~{layout/backend :: scripts}"></div>

    <!-- ===== 本頁 JavaScript ===== -->
    <script th:src="@{/js/order.js}"></script>

</body>
</html>
