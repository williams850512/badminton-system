<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增訂單</title>
</head>
<body>
    <h1>新增訂單</h1>
    <form th:action="@{/admin/orders/add}" th:object="${order}" method="post">
        <div>
            <label>會員ID:</label>
            <input type="number" th:field="*{memberId}" required />
        </div>
        <div>
            <label>總金額:</label>
            <input type="number" th:field="*{totalAmount}" required />
        </div>
        <div>
            <label>狀態:</label>
            <!-- 配合 OrderStatus Enum，強迫只能選這四個值，防止後端資料綁定失敗 -->
            <select th:field="*{status}">
                <option value="UNPAID">未付款</option>
                <option value="PAID">已付款</option>
                <option value="COMPLETED">已完成</option>
                <option value="CANCELLED">已取消</option>
            </select>
        </div>
        <div>
            <label>付款方式:</label>
            <input type="text" th:field="*{paymentType}" />
        </div>
        <div>
            <label>備註:</label>
            <textarea th:field="*{note}"></textarea>
        </div>
        <button type="submit">送出</button>
        <a th:href="@{/admin/orders}">返回列表</a>
    </form>
</body>
</html>
