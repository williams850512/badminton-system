<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    ============================================================
    管理員（職員）管理 CRUD 頁面
    ============================================================
    【組員模板說明】複製這個檔案後，只需修改：
    1. head 裡的頁面標題
    2. page-header 區的標題和按鈕文字
    3. 表格的欄位（thead + tbody 渲染）
    4. Modal 表單的欄位
    5. JavaScript 裡的 API 路徑和欄位名稱
    ============================================================
-->
<head th:replace="~{layout/backend :: head('職員管理')}"></head>
<body>

    <!-- ===== Header 導覽列 ===== -->
    <nav th:replace="~{layout/backend :: header}"></nav>

    <div class="d-flex">
        <!-- ===== Sidebar 側邊欄 ===== -->
        <aside th:replace="~{layout/backend :: sidebar}"></aside>

        <!-- ===== 主內容區（只改這裡面！）===== -->
        <main class="main-content">

            <!-- 頁面標題 + 搜尋列 + 新增按鈕 -->
            <div class="page-header">
                <h2><i class="bi bi-person-badge"></i> 職員管理</h2>
                <div class="d-flex gap-2">
                    <input type="text" class="form-control form-control-sm" id="searchKeyword"
                           placeholder="搜尋帳號、姓名..." style="width: 220px;">
                    <button class="btn btn-outline-secondary btn-sm" onclick="searchAdmins()">
                        <i class="bi bi-search"></i> 搜尋
                    </button>
                    <button class="btn btn-outline-warning btn-sm" id="btnClear"
                            onclick="resetSearch()" style="display: none;">
                        <i class="bi bi-x-lg"></i> 清除
                    </button>
                    <a href="/member" class="btn btn-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i> 返回會員管理
                    </a>
                    <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
                        <i class="bi bi-plus-lg"></i> 新增職員
                    </button>
                </div>
            </div>

            <!-- 職員資料表格 -->
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="adminTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>帳號 / 姓名</th>
                                <th>職位權限</th>
                                <th>性別 / 生日</th>
                                <th>聯絡資訊</th>
                                <th>創建時間</th>
                                <th>最後登入</th>
                                <th>狀態</th>
                                <th style="width: 200px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="loading-row">
                                <td colspan="9">
                                    <div class="spinner-border spinner-border-sm text-primary"></div>
                                    載入中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- ===== Footer ===== -->
    <footer th:replace="~{layout/backend :: footer}"></footer>

    <!-- ===== 新增/編輯 Modal ===== -->
    <div class="modal fade" id="adminModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增職員</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="adminForm">
                        <!-- 隱藏欄位：記錄正在編輯的 ID（新增時為空） -->
                        <input type="hidden" id="editId">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">帳號 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="username"
                                       placeholder="請輸入登入帳號" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label">密碼 <span class="text-danger" id="pwdRequired">*</span></label>
                                <input type="password" class="form-control" id="password"
                                       placeholder="編輯時留空則不修改">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="fullName" class="form-label">姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="fullName"
                                       placeholder="請輸入姓名" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="role" class="form-label">職位權限 <span class="text-danger">*</span></label>
                                <select class="form-select" id="role" required>
                                    <option value="staff">一般職員</option>
                                    <option value="manager">主管</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="gender" class="form-label">性別 <span class="text-danger">*</span></label>
                                <select class="form-select" id="gender" required>
                                    <option value="男">男</option>
                                    <option value="女">女</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="birthday" class="form-label">生日 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="birthday" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="phone" class="form-label">電話 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="phone"
                                       placeholder="09xx-xxx-xxx" maxlength="12" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="email"
                                       placeholder="example@mail.com" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="saveAdmin()">
                        <i class="bi bi-check-lg"></i> 儲存
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 共用 Scripts ===== -->
    <div th:replace="~{layout/backend :: scripts}"></div>

    <!-- ===== 本頁 JavaScript（AJAX + DOM 操作）===== -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:inline="javascript">
        // ============================================================
        // API 路徑（修改這裡就能套用到其他模組）
        // ============================================================
        const API_URL = '/api/admin';

        // 目前登入者資訊（用於排除自我刪除）
        const currentAdminId = /*[[${session.adminUser != null ? session.adminUser.adminId : -1}]]*/ -1;

        // Bootstrap Modal 實例
        let adminModal;

        // ============================================================
        // 頁面載入
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            adminModal = new bootstrap.Modal(document.getElementById('adminModal'));
            loadData();

            // 支援 Enter 鍵搜尋
            document.getElementById('searchKeyword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') searchAdmins();
            });

            // 電話自動帶入橫線 09xx-xxx-xxx
            document.getElementById('phone').addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '');
                if (v.length > 10) v = v.substring(0, 10);
                let f = '';
                if (v.length > 0) f = v.substring(0, 4);
                if (v.length > 4) f += '-' + v.substring(4, 7);
                if (v.length > 7) f += '-' + v.substring(7, 10);
                e.target.value = f;
            });

            // 日期選取完畢自動關閉
            document.getElementById('birthday').addEventListener('change', function() {
                this.blur();
            });
        });

        // ============================================================
        // 【READ】載入所有職員
        // ============================================================
        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `
                <tr class="loading-row">
                    <td colspan="9">
                        <div class="spinner-border spinner-border-sm text-primary"></div> 載入中...
                    </td>
                </tr>`;

            try {
                const response = await fetch(`${API_URL}/list`);   // GET /api/admin/list
                const admins = await response.json();

                if (admins.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="9" class="text-center text-muted py-4">
                            目前沒有職員資料，請點擊「新增職員」按鈕
                        </td></tr>`;
                    return;
                }

                renderTable(admins);

            } catch (error) {
                tbody.innerHTML = `
                    <tr><td colspan="9" class="text-center text-danger py-4">
                        <i class="bi bi-exclamation-triangle"></i> 載入失敗：${error.message}
                        <br><button class="btn btn-sm btn-outline-primary mt-2" onclick="loadData()">重試</button>
                    </td></tr>`;
            }
        }

        // ============================================================
        // 【SEARCH】搜尋職員
        // ============================================================
        async function searchAdmins() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            if (!keyword) { loadData(); return; }

            try {
                const response = await fetch(`${API_URL}/search?keyword=${encodeURIComponent(keyword)}`);
                const data = await response.json();
                renderTable(data);
                document.getElementById('btnClear').style.display = 'inline-block';
            } catch (error) {
                alert('搜尋失敗：' + error.message);
            }
        }

        function resetSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('btnClear').style.display = 'none';
            loadData();
        }

        // ============================================================
        // 渲染表格（loadData 和 searchAdmins 共用）
        // ============================================================
        function renderTable(admins) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            admins.forEach(a => {
                const noteEscaped = (a.note || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const isSelf = (a.adminId === currentAdminId);
                tbody.innerHTML += `
                    <tr>
                        <td>${a.adminId}</td>
                        <td>
                            <strong>${a.username}</strong>
                            <div class="text-muted small">${a.fullName || ''}</div>
                        </td>
                        <td>${getRoleBadge(a.role)}</td>
                        <td>
                            <div>${a.gender || '<span class="text-muted">-</span>'}</div>
                            <div class="text-muted small">${a.birthday || '-'}</div>
                        </td>
                        <td>
                            <div class="small">📱 ${a.phone || '-'}</div>
                            <div class="text-muted small">📧 ${a.email || '-'}</div>
                        </td>
                        <td class="small">${a.createdAt || '-'}</td>
                        <td class="small">${a.lastLoginAt || '<span class="text-muted">尚未登入</span>'}</td>
                        <td>${getStatusBadge(a.status)}</td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-primary" title="編輯"
                                        onclick='openEditModal(${JSON.stringify(a)})'>
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-outline-info" title="備註"
                                        onclick="showNote(${a.adminId}, '${a.fullName || a.username}', '${noteEscaped}')">
                                    <i class="bi bi-sticky"></i>
                                </button>
                                <button class="btn btn-outline-danger" title="刪除"
                                        onclick="deleteAdmin(${a.adminId}, '${a.username}')"
                                        ${isSelf ? 'disabled' : ''}>
                                    <i class="bi bi-trash"></i>
                                </button>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            data-bs-toggle="dropdown" title="變更狀態"
                                            ${isSelf ? 'disabled' : ''}>
                                        <i class="bi bi-arrow-repeat"></i>
                                    </button>
                                    <ul class="dropdown-menu">
                                        <li><a class="dropdown-item" href="#"
                                               onclick="changeStatus(${a.adminId}, 'active')">
                                            <i class="bi bi-check-circle text-success"></i> 啟用
                                        </a></li>
                                        <li><a class="dropdown-item" href="#"
                                               onclick="changeStatus(${a.adminId}, 'inactive')">
                                            <i class="bi bi-x-circle text-danger"></i> 停用
                                        </a></li>
                                    </ul>
                                </div>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        // ============================================================
        // 狀態 / 角色 Badge 對應
        // ============================================================
        function getStatusBadge(status) {
            const map = {
                'active':   '<span class="badge badge-active">啟用中</span>',
                'inactive': '<span class="badge badge-inactive">已停用</span>'
            };
            return map[status] || `<span class="badge bg-secondary">${status}</span>`;
        }

        function getRoleBadge(role) {
            if (role === 'manager') return '<span class="badge bg-danger">💼 主管</span>';
            return '<span class="badge bg-primary">👤 一般職員</span>';
        }

        // ============================================================
        // 【CREATE】打開新增 Modal
        // ============================================================
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '新增職員';
            document.getElementById('adminForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('username').disabled = false;
            document.getElementById('role').disabled = false;
            document.getElementById('pwdRequired').style.display = '';
            adminModal.show();
        }

        // ============================================================
        // 【UPDATE】打開編輯 Modal（帶入舊資料）
        // ============================================================
        function openEditModal(admin) {
            document.getElementById('modalTitle').textContent = '編輯職員';
            document.getElementById('editId').value = admin.adminId;
            document.getElementById('username').value = admin.username;
            document.getElementById('username').disabled = true;
            document.getElementById('password').value = '';
            document.getElementById('pwdRequired').style.display = 'none';
            document.getElementById('fullName').value = admin.fullName || '';
            document.getElementById('role').value = admin.role || 'staff';
            // 主管不能改自己的職位
            document.getElementById('role').disabled = (admin.adminId === currentAdminId);
            document.getElementById('gender').value = admin.gender || '';
            document.getElementById('birthday').value = admin.birthday || '';
            document.getElementById('phone').value = admin.phone || '';
            document.getElementById('email').value = admin.email || '';
            adminModal.show();
        }

        // ============================================================
        // 【CREATE / UPDATE】儲存（根據有無 ID 判斷新增或更新）
        // ============================================================
        async function saveAdmin() {
            const id = document.getElementById('editId').value;
            const data = {
                username: document.getElementById('username').value.trim(),
                fullName: document.getElementById('fullName').value.trim(),
                role:     document.getElementById('role').value,
                gender:   document.getElementById('gender').value,
                birthday: document.getElementById('birthday').value || null,
                phone:    document.getElementById('phone').value.trim(),
                email:    document.getElementById('email').value.trim()
            };

            const pwd = document.getElementById('password').value;
            if (pwd) data.password = pwd;

            // 前端驗證
            if (!data.username || !data.fullName || !data.gender || !data.birthday || !data.phone || !data.email) {
                Swal.fire('提示', '請填寫所有必填欄位！', 'warning');
                return;
            }
            if (!id && !pwd) {
                Swal.fire('提示', '新增職員時請設定密碼！', 'warning');
                return;
            }
            // 電話驗證：必須為 09 開頭的 10 位數字
            const phoneDigits = data.phone.replace(/\D/g, '');
            if (phoneDigits.length !== 10 || !phoneDigits.startsWith('09')) {
                Swal.fire('提示', '電話格式錯誤！必須為 09 開頭的 10 位數字', 'warning');
                return;
            }
            // Email 驗證：必須包含 @ 且格式為 xxx@xxx
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
                Swal.fire('提示', 'Email 格式錯誤！請輸入正確格式（例：abc@mail.com）', 'warning');
                return;
            }

            try {
                let response;
                if (id) {
                    // 有 ID → PUT 更新
                    response = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    // 沒 ID → POST 新增
                    response = await fetch(`${API_URL}/add`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                if (response.ok) {
                    adminModal.hide();
                    loadData();
                    Swal.fire('成功', id ? '職員更新成功！' : '職員新增成功！', 'success');
                } else {
                    const err = await response.text();
                    Swal.fire('失敗', '操作失敗：' + err, 'error');
                }
            } catch (error) {
                Swal.fire('錯誤', '請求失敗：' + error.message, 'error');
            }
        }

        // ============================================================
        // 【DELETE】刪除職員
        // ============================================================
        async function deleteAdmin(id, name) {
            if (id === currentAdminId) {
                Swal.fire('無法刪除', '不能刪除自己的帳號', 'warning');
                return;
            }

            const result = await Swal.fire({
                title: '確定要刪除嗎？',
                text: `即將移除職員「${name}」，此操作無法撤銷！`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                confirmButtonText: '確定刪除',
                cancelButtonText: '取消'
            });

            if (!result.isConfirmed) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    Swal.fire('已刪除', '職員已移除', 'success');
                    loadData();
                } else {
                    Swal.fire('失敗', '刪除失敗', 'error');
                }
            } catch (error) {
                Swal.fire('錯誤', '請求失敗：' + error.message, 'error');
            }
        }

        // ============================================================
        // 【PATCH】變更狀態
        // ============================================================
        async function changeStatus(id, newStatus) {
            try {
                const response = await fetch(`${API_URL}/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    loadData();
                    Swal.fire('成功', '狀態已更新', 'success');
                } else {
                    Swal.fire('失敗', '狀態更新失敗', 'error');
                }
            } catch (error) {
                Swal.fire('錯誤', '請求失敗：' + error.message, 'error');
            }
        }

        // ============================================================
        // 【PATCH】管理員備註
        // ============================================================
        async function showNote(id, name, currentNote) {
            const displayNote = (currentNote === 'null' || !currentNote) ? '' : currentNote;
            const result = await Swal.fire({
                title: name + ' 的管理備註',
                input: 'textarea',
                inputValue: displayNote,
                showCancelButton: true,
                confirmButtonText: '儲存',
                cancelButtonText: '取消'
            });

            if (!result.isConfirmed) return;

            try {
                const response = await fetch(`${API_URL}/${id}/note`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note: result.value })
                });
                if (response.ok) {
                    Swal.fire('成功', '備註已更新', 'success');
                    loadData();
                } else {
                    Swal.fire('失敗', '備註更新失敗', 'error');
                }
            } catch (error) {
                Swal.fire('錯誤', '請求失敗：' + error.message, 'error');
            }
        }
    </script>

</body>
</html>
