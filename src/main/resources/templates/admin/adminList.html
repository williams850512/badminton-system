<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>羽球館 | 系統管理員中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f7f6; margin: 0; }
        .app-container { display: flex; min-height: 100vh; }
        .main-content { flex: 1; padding: 20px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; }
        
        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #333; }

        /* 按鈕風格 */
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-warning { background-color: #f1c40f; color: #333; }
        .btn-info { background-color: #9b59b6; color: white; }
        .btn-disabled { background-color: #bdc3c7; color: #ecf0f1; cursor: not-allowed; }

        .search-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .form-control { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; color: #fff; }
        .badge-manager { background-color: #be123c; }
        .badge-staff { background-color: #0369a1; }
        .status-active { color: #2ecc71; font-weight: bold; }
        .status-inactive { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: #333;">🏸 系統管理員中心</h2>
            <a href="/member/list" class="btn btn-primary" style="background-color: #7f8c8d;">← 返回會員管理</a>
        </div>
        
        <div class="card">
            <div class="search-bar">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="adminKeyword" class="form-control" placeholder="搜尋姓名/帳號...">
                    <button onclick="searchAdmins()" class="btn btn-primary">🔍 搜尋</button>
                    <button id="btnClear" onclick="resetSearch()" class="btn btn-warning" style="display: none;">✕ 清除</button>
                </div>
                <a href="/admin/add" class="btn btn-primary">＋ 新增管理員</a>
            </div>

            <table id="adminTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>帳號 / 姓名</th>
                        <th>職位權限</th>
                        <th>性別 / 生日</th>
                        <th>聯絡資訊</th>
                        <th>創建時間</th>
                        <th>最後登入</th>
                        <th>狀態</th>
                        <th style="text-align: center;">操作</th>
                    </tr>
                </thead>
                <tbody id="adminListData">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let isSearching = false;

    // 1. 頁面載入時自動讀取資料
    window.onload = function() { loadAdmins(); };

    function loadAdmins() {
        fetch('/api/admin/list')
            .then(res => res.json())
            .then(data => renderTable(data));
    }

    function searchAdmins() {
        const keyword = document.getElementById('adminKeyword').value.trim();
        if (!keyword) { loadAdmins(); return; }

        fetch(`/api/admin/search?keyword=${encodeURIComponent(keyword)}`)
            .then(res => res.json())
            .then(data => {
                renderTable(data);
                isSearching = true;
                document.getElementById('btnClear').style.display = 'inline-block';
            });
    }

    function renderTable(data) {
        const tbody = document.getElementById('adminListData');
        tbody.innerHTML = '';

        data.forEach(a => {
            const noteEscaped = (a.note || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const row = `
                <tr>
                    <td>#${a.adminId}</td>
                    <td>
                        <div style="font-weight: bold;">${a.username}</div>
                        <div style="font-size: 12px; color: #7f8c8d;">${a.fullName}</div>
                    </td>
                    <td>
                        <span class="badge ${a.role === 'manager' ? 'badge-manager' : 'badge-staff'}">
                            ${a.role === 'manager' ? '💼 主管' : '👤 一般職員'}
                        </span>
                    </td>
                    <td>
                        <div>${a.gender || '未填'}</div>
                        <div style="font-size: 12px; color: #7f8c8d;">🎂 ${a.birthday || '未填'}</div>
                    </td>
                    <td>
                        <div style="font-size: 13px;">📱 ${a.phone || ''}</div>
                        <div style="font-size: 12px; color: #7f8c8d;">📧 ${a.email || ''}</div>
                    </td>
                    <td style="font-size: 12px;">${a.createdAt || '---'}</td>
                    <td style="font-size: 12px;">${a.lastLoginAt ? a.lastLoginAt : '<span style="color:#bdc3c7;">尚未登入</span>'}</td>
                    <td>
                        <span class="${a.status === 'active' ? 'status-active' : 'status-inactive'}">
                            ${a.status === 'active' ? '● 啟用中' : '● 停用'}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <div style="display: flex; gap: 5px; justify-content: center;">
                            <button class="btn btn-warning" onclick="editAdmin(${a.adminId})">編輯</button>
                            <button class="btn btn-info" onclick="showNote(${a.adminId}, '${a.fullName}', '${noteEscaped}')">備註</button>
                            <button class="btn btn-danger" onclick="confirmDeleteAdmin(${a.adminId}, '${a.username}')">刪除</button>
                        </div>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // 支援 Enter 鍵搜尋
    document.getElementById('adminKeyword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') searchAdmins();
    });

    function resetSearch() {
        document.getElementById('adminKeyword').value = '';
        document.getElementById('btnClear').style.display = 'none';
        isSearching = false;
        loadAdmins();
    }

    function editAdmin(id) {
        window.location.href = `/admin/edit?id=${id}`;
    }

    // 備註彈窗 (RESTful PATCH) — 修正 API 路徑
    function showNote(id, name, currentNote) {
        Swal.fire({
            title: name + ' 的管理備註',
            input: 'textarea',
            inputValue: currentNote && currentNote !== 'null' ? currentNote : '',
            showCancelButton: true,
            confirmButtonText: '儲存更新'
        }).then((result) => {
            if (result.isConfirmed) {
                fetch(`/api/admin/${id}/note`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note: result.value })
                }).then(res => {
                    if (res.ok) Swal.fire('成功', '備註已更新', 'success').then(() => loadAdmins());
                    else Swal.fire('失敗', '備註更新失敗', 'error');
                });
            }
        });
    }

    // 刪除確認 (RESTful DELETE) — 修正 API 路徑
    function confirmDeleteAdmin(id, username) {
        Swal.fire({
            title: '確定要刪除嗎？',
            text: `即將移除「${username}」，此操作無法撤銷！`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e74c3c',
            confirmButtonText: '確定刪除'
        }).then((result) => {
            if (result.isConfirmed) {
                fetch(`/api/admin/${id}`, { method: 'DELETE' })
                    .then(res => {
                        if (res.ok) {
                            Swal.fire('已刪除', '管理員已移除', 'success').then(() => loadAdmins());
                        } else {
                            Swal.fire('失敗', '無法刪除自己或系統關鍵帳號', 'error');
                        }
                    });
            }
        });
    }
</script>
</body>
</html>
