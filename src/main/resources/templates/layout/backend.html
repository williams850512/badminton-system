<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    ============================================================
    共用 Layout 片段檔
    ============================================================
    使用方式（在你的頁面裡）：
    
    <head th:replace="~{layout/backend :: head('你的頁面標題')}"></head>
    <nav  th:replace="~{layout/backend :: header}"></nav>
    <aside th:replace="~{layout/backend :: sidebar}"></aside>
    <footer th:replace="~{layout/backend :: footer}"></footer>
    <div th:replace="~{layout/backend :: scripts}"></div>
    ============================================================
-->

<!-- ==================== Head 片段 ==================== -->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - 羽球預約管理系統'">羽球預約管理系統</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- 共用自訂樣式 -->
    <link th:href="@{/css/backend.css}" rel="stylesheet">
</head>

<body>

<!-- ==================== Header 導覽列片段 ==================== -->
<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <!-- Logo / 標題 -->
        <a class="navbar-brand" th:href="@{/}">
            🏸 羽球預約管理系統
        </a>

        <!-- 手機版漢堡選單按鈕 -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- 右側選單 -->
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <span class="nav-link text-light">
                        <i class="bi bi-person-circle"></i> 管理員
                    </span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/login}">
                        <i class="bi bi-box-arrow-right"></i> 登出
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ==================== Sidebar 側邊欄片段 ==================== -->
<aside th:fragment="sidebar" class="sidebar bg-light" id="sidebar">
    <nav class="nav flex-column pt-3">
        <span class="sidebar-heading px-3 mb-2 text-muted text-uppercase small">場地管理</span>
        <a class="nav-link" th:href="@{/venues}" data-page="venues">
            <i class="bi bi-building"></i> 場館管理
        </a>
        <a class="nav-link" th:href="@{/courts}" data-page="courts">
            <i class="bi bi-grid-3x3"></i> 球場管理
        </a>

        <hr class="mx-3">
        <span class="sidebar-heading px-3 mb-2 text-muted text-uppercase small">預約管理</span>
        <a class="nav-link" th:href="@{/bookings}" data-page="bookings">
            <i class="bi bi-calendar-check"></i> 預約管理
        </a>
        <a class="nav-link" th:href="@{/timeslots}" data-page="timeslots">
            <i class="bi bi-clock"></i> 時段管理
        </a>

        <hr class="mx-3">
        <span class="sidebar-heading px-3 mb-2 text-muted text-uppercase small">會員 / 訂單</span>
        <a class="nav-link" th:href="@{/member}" data-page="member">
            <i class="bi bi-people"></i> 會員管理
        </a>
        <a class="nav-link" th:href="@{/orders}" data-page="orders">
            <i class="bi bi-receipt"></i> 訂單管理
        </a>

        <hr class="mx-3">
        <span class="sidebar-heading px-3 mb-2 text-muted text-uppercase small">其他功能</span>
        <a class="nav-link" th:href="@{/products}" data-page="products">
            <i class="bi bi-box-seam"></i> 商品管理
        </a>
        <a class="nav-link" th:href="@{/pickup-games}" data-page="pickup-games">
            <i class="bi bi-people-fill"></i> 揪團管理
        </a>
        <a class="nav-link" th:href="@{/announcements}" data-page="announcements">
            <i class="bi bi-megaphone"></i> 公告管理
        </a>
    </nav>
</aside>

<!-- ==================== Footer 頁尾片段 ==================== -->
<footer th:fragment="footer" class="footer text-center text-muted py-3">
    <small>&copy; 2026 羽球預約管理系統 — Spring Boot + Hibernate + RESTful</small>
</footer>

<!-- ==================== Scripts 共用 JS 片段 ==================== -->
<div th:fragment="scripts">
    <!-- Bootstrap 5 JS Bundle (含 Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 共用 JS：自動高亮當前頁面的 sidebar 選項 -->
    <script>
        (function() {
            const currentPath = window.location.pathname;
            const links = document.querySelectorAll('.sidebar .nav-link');

            // 找出「最長匹配」的那個連結（越精確越優先）
            let bestMatch = null;
            let bestLength = 0;

            links.forEach(link => {
                const href = link.getAttribute('href');
                if (currentPath.startsWith(href) && href.length > bestLength) {
                    bestMatch = link;
                    bestLength = href.length;
                }
            });

            if (bestMatch) {
                bestMatch.classList.add('active');
            }
        })();
    </script>
</div>

</body>
</html>
