<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/backend :: head('臨打揪團管理')}"></head>
<body>

    <!-- ===== Header 導覽列 ===== -->
    <nav th:replace="~{layout/backend :: header}"></nav>

    <div class="d-flex">
        <!-- ===== Sidebar 側邊欄 ===== -->
        <aside th:replace="~{layout/backend :: sidebar}"></aside>

        <!-- ===== 主內容區 ===== -->
        <main class="main-content">

            <!-- 頁面標題 + 搜尋 + 新增按鈕 -->
            <div class="page-header">
                <h2><i class="bi bi-people"></i> 臨打揪團管理</h2>
                <div class="d-flex gap-2">
                    <div class="input-group" style="width: 300px;">
                        <input type="text" class="form-control" id="searchKeyword"
                               placeholder="搜尋主揪、場地、日期...">
                        <button class="btn btn-outline-secondary" onclick="searchData()">
                            <i class="bi bi-search"></i>
                        </button>
                        <button class="btn btn-outline-danger" onclick="clearSearch()" title="清除搜尋">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <button class="btn btn-primary" onclick="openCreateModal()">
                        <i class="bi bi-plus-lg"></i> 新增揪團
                    </button>
                </div>
            </div>

            <!-- 揪團資料表格 -->
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="gameTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>主揪</th>
                                <th>場地</th>
                                <th>日期</th>
                                <th>時間</th>
                                <th>人數</th>
                                <th>程度</th>
                                <th>狀態</th>
                                <th style="width: 200px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="loading-row">
                                <td colspan="9">
                                    <div class="spinner-border spinner-border-sm text-primary"></div>
                                    載入中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- ===== Footer ===== -->
    <footer th:replace="~{layout/backend :: footer}"></footer>

    <!-- ===== 新增/編輯 Modal ===== -->
    <div class="modal fade" id="gameModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增揪團</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="gameForm">
                        <input type="hidden" id="editId">
                        <input type="hidden" id="hostId">

                        <!-- 主揪搜尋 -->
                        <div class="mb-3">
                            <label for="hostSearch" class="form-label">主揪 <span class="text-danger">*</span></label>
                            <div class="position-relative">
                                <input type="text" class="form-control" id="hostSearch"
                                       placeholder="輸入姓名或手機搜尋會員" autocomplete="off" required>
                                <div id="hostSearchResults" class="list-group position-absolute w-100 shadow"
                                     style="z-index: 1060; max-height: 200px; overflow-y: auto; display: none;"></div>
                            </div>
                            <small id="hostSelectedInfo" class="text-success"></small>
                        </div>

                        <!-- 場地選擇 -->
                        <div class="mb-3">
                            <label for="courtId" class="form-label">場地 <span class="text-danger">*</span></label>
                            <select class="form-select" id="courtId" required>
                                <option value="">載入中...</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="gameDate" class="form-label">日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="gameDate" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label for="startTime" class="form-label">開始時間 <span class="text-danger">*</span></label>
                                <select class="form-select" id="startTime" required>
                                    <option value="">請選擇</option>
                                    <option value="10:00">10:00</option>
                                    <option value="11:00">11:00</option>
                                    <option value="12:00">12:00</option>
                                    <option value="13:00">13:00</option>
                                    <option value="14:00">14:00</option>
                                    <option value="15:00">15:00</option>
                                    <option value="16:00">16:00</option>
                                    <option value="17:00">17:00</option>
                                    <option value="18:00">18:00</option>
                                    <option value="19:00">19:00</option>
                                    <option value="20:00">20:00</option>
                                    <option value="21:00">21:00</option>
                                </select>
                            </div>
                            <div class="col-6 mb-3">
                                <label for="endTime" class="form-label">結束時間 <span class="text-danger">*</span></label>
                                <select class="form-select" id="endTime" required>
                                    <option value="">請先選擇開始時間</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label for="maxPlayers" class="form-label">最大人數 <span class="text-danger">*</span></label>
                                <select class="form-select" id="maxPlayers" required>
                                    <option value="1">1 人</option>
                                    <option value="2">2 人</option>
                                    <option value="3">3 人</option>
                                    <option value="4" selected>4 人</option>
                                    <option value="5">5 人</option>
                                    <option value="6">6 人</option>
                                    <option value="7">7 人</option>
                                    <option value="8">8 人</option>
                                    <option value="9">9 人</option>
                                    <option value="10">10 人</option>
                                    <option value="11">11 人</option>
                                    <option value="12">12 人</option>
                                </select>
                            </div>
                            <div class="col-6 mb-3">
                                <label for="skillLevel" class="form-label">程度要求</label>
                                <select class="form-select" id="skillLevel">
                                    <option value="ALL">不限</option>
                                    <option value="BEGINNER">初級</option>
                                    <option value="INTERMEDIATE">中級</option>
                                    <option value="ADVANCED">高級</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveGame()">
                        <i class="bi bi-check-lg"></i> 儲存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 共用 Scripts ===== -->
    <div th:replace="~{layout/backend :: scripts}"></div>

    <!-- ===== 本頁 JavaScript ===== -->
    <script>
        const API_URL = '/api/pickup-games';
        const MEMBER_API_URL = '/api/members';
        const SIGNUPS_API_URL = '/api/pickup-game-signups';
        const COURT_API_URL = '/api/courts';
        let gameModal;
        
        // 用於暫存揪團資料（避免 JSON.stringify 巢狀物件問題）
        let cachedGames = [];
        // 暫存場地資料
        let cachedCourts = [];

        document.addEventListener('DOMContentLoaded', function() {
            gameModal = new bootstrap.Modal(document.getElementById('gameModal'));
            
            // 日期防呆：不能選今天以前的日期
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('gameDate').setAttribute('min', today);
            
            // 當開始時間變更時，動態更新結束時間選單
            document.getElementById('startTime').addEventListener('change', function() {
                updateEndTimeOptions(this.value);
            });

            // 綁定主揪搜尋事件（防抖動）
            document.getElementById('hostSearch').addEventListener('input',
                debounce(() => searchHost(), 300));
            
            // 點擊其他地方時關閉搜尋結果
            document.addEventListener('click', function(e) {
                const results = document.getElementById('hostSearchResults');
                if (results && !e.target.closest('#hostSearch') && !e.target.closest('#hostSearchResults')) {
                    results.style.display = 'none';
                }
            });
            
            // 搜尋框按 Enter 觸發搜尋
            document.getElementById('searchKeyword').addEventListener('keyup', function(e) {
                if (e.key === 'Enter') searchData();
            });

            // 載入場地選單
            loadCourts();
            
            loadData();
        });
        
        // 動態產生結束時間選項（只顯示「開始時間之後」的時段）
        function updateEndTimeOptions(startValue) {
            const endSelect = document.getElementById('endTime');
            endSelect.innerHTML = '';
            
            if (!startValue) {
                endSelect.innerHTML = '<option value="">請先選擇開始時間</option>';
                return;
            }
            
            const startHour = parseInt(startValue.split(':')[0]);
            
            // 結束時間從「開始 +1 小時」到 22:00
            endSelect.innerHTML = '<option value="">請選擇結束時間</option>';
            for (let h = startHour + 1; h <= 22; h++) {
                const val = h.toString().padStart(2, '0') + ':00';
                endSelect.innerHTML += `<option value="${val}">${val}</option>`;
            }
        }

        // 載入表格資料
        async function loadData(keyword) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr class="loading-row"><td colspan="9"><div class="spinner-border spinner-border-sm text-primary"></div> 載入中...</td></tr>';

            try {
                const response = await fetch(API_URL);
                let games = await response.json();

                // 前端模糊篩選
                if (keyword) {
                    const kw = keyword.toLowerCase();
                    games = games.filter(g => {
                        const hostName = g.host ? (g.host.fullName || g.host.username || '') : '';
                        const courtName = g.court ? (g.court.courtName || '') : '';
                        const venueName = (g.court && g.court.venue) ? (g.court.venue.venueName || '') : '';
                        const date = g.gameDate || '';
                        const skill = g.skillLevel || '';
                        const status = g.status || '';
                        return hostName.toLowerCase().includes(kw)
                            || courtName.toLowerCase().includes(kw)
                            || venueName.toLowerCase().includes(kw)
                            || date.includes(kw)
                            || skill.toLowerCase().includes(kw)
                            || status.toLowerCase().includes(kw);
                    });
                }

                cachedGames = games; // 暫存供編輯用

                if (games.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">目前沒有資料</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                games.forEach((game, index) => {
                    // 主揪顯示（從 @ManyToOne 關聯物件取得）
                    let hostInfo = '<span class="text-muted">-</span>';
                    if (game.host) {
                        hostInfo = `${game.host.fullName || game.host.username} <small class="text-muted">(ID: ${game.host.memberId})</small>`;
                    }

                    // 場地顯示（從 @ManyToOne 關聯物件取得）
                    let courtInfo = '<span class="text-muted">-</span>';
                    if (game.court) {
                        const venueName = game.court.venue ? game.court.venue.venueName : '';
                        courtInfo = venueName ? `${venueName} / <strong>${game.court.courtName}</strong>` : `<strong>${game.court.courtName}</strong>`;
                    }

                    // 時間顯示
                    const timeStr = (game.startTime && game.endTime)
                        ? `${game.startTime.substring(0,5)} ~ ${game.endTime.substring(0,5)}`
                        : '-';

                    // 人數顯示
                    const currentP = game.currentPlayers || 0;
                    const maxP = game.maxPlayers || '-';
                    const isFull = (maxP !== '-' && currentP >= maxP);
                    const playersBadge = isFull
                        ? `<span class="badge bg-danger">${currentP} / ${maxP}</span>`
                        : `<span class="badge bg-info text-dark">${currentP} / ${maxP}</span>`;

                    tbody.innerHTML += `
                        <tr>
                            <td>${game.gameId}</td>
                            <td>${hostInfo}</td>
                            <td>${courtInfo}</td>
                            <td><strong>${game.gameDate}</strong></td>
                            <td>${timeStr}</td>
                            <td>${playersBadge}</td>
                            <td>${getSkillLevelBadge(game.skillLevel)}</td>
                            <td>${getStatusBadge(game.status)}</td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-info" title="查看報名"
                                            data-game-id="${game.gameId}"
                                            onclick="toggleSignups(${game.gameId}, this)">
                                        <i class="bi bi-caret-right-fill"></i> 查看報名
                                    </button>
                                    <button class="btn btn-outline-primary" title="編輯" onclick="openEditModal(${index})">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-outline-danger" title="刪除"
                                            onclick="deleteGame(${game.gameId})">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>`;
                });

            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center text-danger py-4">載入失敗：${error.message}</td></tr>`;
            }
        }

        function getStatusBadge(status) {
            const map = {
                'OPEN':      '<span class="badge bg-success">開放中</span>',
                'CANCELLED': '<span class="badge bg-secondary">已取消</span>',
                'FULL':      '<span class="badge bg-warning text-dark">已額滿</span>',
                'CLOSED':    '<span class="badge bg-dark">已結束</span>'
            };
            return map[status] || `<span class="badge bg-info">${status}</span>`;
        }
        
        function getSkillLevelBadge(level) {
            const map = {
                'ALL':          '<span class="badge bg-secondary">不限</span>',
                'BEGINNER':     '<span class="badge bg-success">初級</span>',
                'INTERMEDIATE': '<span class="badge bg-primary">中級</span>',
                'ADVANCED':     '<span class="badge bg-danger">高級</span>'
            };
            return map[level] || `<span class="badge bg-secondary">${level}</span>`;
        }

        // ============================================================
        // 【SEARCH】模糊搜尋
        // ============================================================
        function searchData() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            loadData(keyword || null);
        }

        function clearSearch() {
            document.getElementById('searchKeyword').value = '';
            loadData();
        }

        // ============================================================
        // 【場地下拉選單】載入所有場地
        // ============================================================
        async function loadCourts() {
            const courtSelect = document.getElementById('courtId');
            try {
                const res = await fetch(COURT_API_URL);
                const courts = await res.json();
                cachedCourts = courts;

                courtSelect.innerHTML = '<option value="">請選擇場地</option>';
                courts.forEach(c => {
                    const venueName = c.venue ? c.venue.venueName + ' / ' : '';
                    courtSelect.innerHTML += `<option value="${c.courtId}">${venueName}${c.courtName}</option>`;
                });
            } catch (error) {
                courtSelect.innerHTML = '<option value="">載入場地失敗</option>';
            }
        }

        // ============================================================
        // 【主揪搜尋】輸入姓名或手機搜尋會員
        // ============================================================
        async function searchHost() {
            const keyword = document.getElementById('hostSearch').value.trim();
            const resultsDiv = document.getElementById('hostSearchResults');

            if (keyword.length < 1) {
                resultsDiv.style.display = 'none';
                return;
            }

            try {
                const res = await fetch(`${MEMBER_API_URL}/search?keyword=${encodeURIComponent(keyword)}`);
                const members = await res.json();

                if (members.length === 0) {
                    resultsDiv.innerHTML = '<div class="list-group-item text-muted small">找不到符合的會員</div>';
                } else {
                    resultsDiv.innerHTML = members.map(m => `
                        <button type="button" class="list-group-item list-group-item-action py-1"
                                onclick="selectHost(${m.memberId}, '${(m.fullName || '').replace(/'/g, "\\'")}', '${(m.phone || '').replace(/'/g, "\\'")}')">
                            <strong>${m.fullName || m.username}</strong>
                            <small class="text-muted ms-1">${m.phone || ''}</small>
                        </button>
                    `).join('');
                }
                resultsDiv.style.display = 'block';
            } catch (error) {
                resultsDiv.innerHTML = '<div class="list-group-item text-danger small">搜尋失敗</div>';
                resultsDiv.style.display = 'block';
            }
        }

        // 選擇主揪
        function selectHost(memberId, name, phone) {
            document.getElementById('hostId').value = memberId;
            document.getElementById('hostSearch').value = name;
            document.getElementById('hostSelectedInfo').textContent = `✓ ${name} (ID: ${memberId}${phone ? ', ' + phone : ''})`;
            document.getElementById('hostSearchResults').style.display = 'none';
        }

        // ============================================================
        // 【Modal 操作】
        // ============================================================
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '新增揪團';
            document.getElementById('gameForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('hostId').value = '';
            document.getElementById('hostSearch').value = '';
            document.getElementById('hostSelectedInfo').textContent = '';
            // 重置結束時間選單
            document.getElementById('endTime').innerHTML = '<option value="">請先選擇開始時間</option>';
            // 預設最大人數
            document.getElementById('maxPlayers').value = '4';
            gameModal.show();
        }

        // 打開編輯 Modal (帶入舊資料，從暫存陣列取得)
        function openEditModal(index) {
            const game = cachedGames[index];
            document.getElementById('modalTitle').textContent = '編輯揪團';
            
            // 填入表單
            document.getElementById('editId').value = game.gameId;
            document.getElementById('gameDate').value = game.gameDate;
            
            // 先把開始時間的值截取成整點格式 (例如 "20:46:00" → "20:00")
            const startHour = game.startTime ? game.startTime.substring(0, 2) + ':00' : '';
            document.getElementById('startTime').value = startHour;
            
            // 觸發結束時間選單更新，再設定結束時間的值
            updateEndTimeOptions(startHour);
            const endHour = game.endTime ? game.endTime.substring(0, 2) + ':00' : '';
            document.getElementById('endTime').value = endHour;
            
            document.getElementById('skillLevel').value = game.skillLevel;
            document.getElementById('maxPlayers').value = game.maxPlayers || 4;
            
            // 處理主揪（顯示名稱 + 設定隱藏 ID）
            if (game.host) {
                document.getElementById('hostId').value = game.host.memberId;
                const hostName = game.host.fullName || game.host.username;
                document.getElementById('hostSearch').value = hostName;
                document.getElementById('hostSelectedInfo').textContent = `✓ ${hostName} (ID: ${game.host.memberId})`;
            } else {
                document.getElementById('hostId').value = '';
                document.getElementById('hostSearch').value = '';
                document.getElementById('hostSelectedInfo').textContent = '';
            }
            
            // 處理場地
            if (game.court) {
                document.getElementById('courtId').value = game.court.courtId;
            }
            
            gameModal.show();
        }

        // 儲存揪團（新增 / 編輯）
        async function saveGame() {
            const id = document.getElementById('editId').value;
            const hostId = document.getElementById('hostId').value;
            const courtId = document.getElementById('courtId').value;

            // 驗證必填
            if (!hostId) {
                alert('請搜尋並選擇一位主揪！');
                return;
            }
            if (!courtId) {
                alert('請選擇場地！');
                return;
            }

            const data = {
                gameDate: document.getElementById('gameDate').value,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                skillLevel: document.getElementById('skillLevel').value,
                maxPlayers: parseInt(document.getElementById('maxPlayers').value),
                host: { memberId: parseInt(hostId) },
                court: { courtId: parseInt(courtId) }
            };

            if (!data.gameDate || !data.startTime || !data.endTime) {
                alert('請填寫完整時間！');
                return;
            }

            try {
                let response;
                if (id) {
                    response = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
                    });
                } else {
                    response = await fetch(API_URL, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
                    });
                }

                if (response.ok) {
                    gameModal.hide();
                    loadData();
                    alert(id ? '更新成功！' : '新增成功！');
                } else {
                    const err = await response.text();
                    console.error("錯誤:", err);
                    alert('操作失敗：' + err);
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // 刪除揪團
        async function deleteGame(id) {
            if (!confirm(`確定要刪除 ID: ${id} 嗎？`)) return;
            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadData();
                    alert('刪除成功！');
                } else {
                    alert('刪除失敗');
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // ============================================================
        // 【展開報名名單】
        // ============================================================
        async function toggleSignups(gameId, btn) {
            // 檢查是否已展開，是的話收合
            const existingRow = document.getElementById(`signups-row-${gameId}`);
            if (existingRow) {
                existingRow.remove();
                btn.innerHTML = '<i class="bi bi-caret-right-fill"></i> 查看報名';
                btn.classList.remove('active');
                return;
            }

            // 切換按鈕圖示 ▶ → ▼
            btn.innerHTML = '<i class="bi bi-caret-down-fill"></i> 收合報名';
            btn.classList.add('active');

            // 建立子列
            const parentRow = btn.closest('tr');
            const subRow = document.createElement('tr');
            subRow.id = `signups-row-${gameId}`;
            subRow.innerHTML = `
                <td colspan="9" style="background-color: #f8f9fa; padding: 16px 24px;">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <strong><i class="bi bi-people-fill"></i> 報名名單</strong>
                        <div class="spinner-border spinner-border-sm" id="signup-loading-${gameId}"></div>
                    </div>
                    <div id="signup-content-${gameId}"></div>
                    <hr class="my-2">
                    <div class="d-flex align-items-center gap-2">
                        <div class="position-relative" style="width: 250px;">
                            <input type="text" class="form-control form-control-sm" id="add-member-search-${gameId}"
                                   placeholder="輸入姓名或手機搜尋會員" autocomplete="off">
                            <input type="hidden" id="add-member-id-${gameId}">
                            <div id="add-member-results-${gameId}" class="list-group position-absolute w-100 shadow"
                                 style="z-index: 1050; max-height: 150px; overflow-y: auto; display: none;"></div>
                        </div>
                        <span id="add-member-name-${gameId}" class="text-success" style="font-size: 0.85em;"></span>
                        <button class="btn btn-sm btn-success" onclick="addSignup(${gameId})">
                            <i class="bi bi-person-plus"></i> 新增報名
                        </button>
                    </div>
                </td>`;
            parentRow.after(subRow);

            // 綁定會員搜尋事件
            const searchInput = document.getElementById(`add-member-search-${gameId}`);
            searchInput.addEventListener('input', debounce(() => searchMemberForSignup(gameId), 300));
            document.addEventListener('click', function handler(e) {
                const results = document.getElementById(`add-member-results-${gameId}`);
                if (results && !e.target.closest(`#add-member-search-${gameId}`) && !e.target.closest(`#add-member-results-${gameId}`)) {
                    results.style.display = 'none';
                }
            });

            // 載入報名資料
            await loadSignups(gameId);
        }

        // 載入某場揪團的報名名單
        async function loadSignups(gameId) {
            const contentDiv = document.getElementById(`signup-content-${gameId}`);
            const loadingEl = document.getElementById(`signup-loading-${gameId}`);
            if (loadingEl) loadingEl.style.display = 'block';

            try {
                const res = await fetch(`${API_URL}/${gameId}/signups`);
                const signups = await res.json();
                if (loadingEl) loadingEl.style.display = 'none';

                if (signups.length === 0) {
                    contentDiv.innerHTML = '<span class="text-muted">目前沒有人報名</span>';
                    return;
                }

                let html = '<table class="table table-sm table-bordered mb-0" style="background: white;">';
                html += '<thead><tr><th>會員</th><th>狀態</th><th>報名時間</th><th style="width:80px">操作</th></tr></thead><tbody>';
                signups.forEach(s => {
                    const name = s.member ? (s.member.fullName || s.member.username) : '未知';
                    const time = s.signedUpAt ? s.signedUpAt.replace('T', ' ').substring(0, 16) : '-';
                    html += `<tr>
                        <td>${name}</td>
                        <td>${getSignupStatusBadge(s.status)}</td>
                        <td><small class="text-muted">${time}</small></td>
                        <td>
                            ${s.status === 'JOINED' ? `<button class="btn btn-outline-danger btn-sm" onclick="removeSignup(${s.signupId}, ${gameId})" title="移除"><i class="bi bi-person-dash"></i></button>` : ''}
                        </td>
                    </tr>`;
                });
                html += '</tbody></table>';
                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = `<span class="text-danger">載入失敗：${error.message}</span>`;
                if (loadingEl) loadingEl.style.display = 'none';
            }
        }

        // 搜尋會員（用於新增報名）
        async function searchMemberForSignup(gameId) {
            const keyword = document.getElementById(`add-member-search-${gameId}`).value.trim();
            const resultsDiv = document.getElementById(`add-member-results-${gameId}`);

            if (keyword.length < 1) {
                resultsDiv.style.display = 'none';
                return;
            }

            try {
                const res = await fetch(`${MEMBER_API_URL}/search?keyword=${encodeURIComponent(keyword)}`);
                const members = await res.json();

                if (members.length === 0) {
                    resultsDiv.innerHTML = '<div class="list-group-item text-muted small">找不到符合的會員</div>';
                } else {
                    resultsDiv.innerHTML = members.map(m => `
                        <button type="button" class="list-group-item list-group-item-action py-1"
                                onclick="selectMemberForSignup(${gameId}, ${m.memberId}, '${m.fullName}')">
                            <strong>${m.fullName}</strong>
                            <small class="text-muted ms-1">${m.phone || ''}</small>
                        </button>
                    `).join('');
                }
                resultsDiv.style.display = 'block';
            } catch (error) {
                resultsDiv.innerHTML = '<div class="list-group-item text-danger small">搜尋失敗</div>';
                resultsDiv.style.display = 'block';
            }
        }

        // 選擇會員
        function selectMemberForSignup(gameId, memberId, name) {
            document.getElementById(`add-member-id-${gameId}`).value = memberId;
            document.getElementById(`add-member-search-${gameId}`).value = name;
            document.getElementById(`add-member-name-${gameId}`).textContent = `✓ ${name} (ID: ${memberId})`;
            document.getElementById(`add-member-results-${gameId}`).style.display = 'none';
        }

        // 新增報名
        async function addSignup(gameId) {
            const memberId = document.getElementById(`add-member-id-${gameId}`).value;
            if (!memberId) {
                alert('請先搜尋並選擇一位會員！');
                return;
            }

            // 檢查是否為主揪本人
            const game = cachedGames.find(g => g.gameId === gameId);
            if (game && game.host && game.host.memberId === parseInt(memberId)) {
                if (!confirm('此會員已是本場揪團的主揪，確定要額外報名嗎？')) {
                    return;
                }
            }

            try {
                const res = await fetch(SIGNUPS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        game: { gameId: gameId },
                        member: { memberId: parseInt(memberId) }
                    })
                });

                if (res.ok) {
                    // 清空輸入
                    document.getElementById(`add-member-search-${gameId}`).value = '';
                    document.getElementById(`add-member-id-${gameId}`).value = '';
                    document.getElementById(`add-member-name-${gameId}`).textContent = '';
                    alert('報名成功！');
                    // 重新載入揪團列表（更新人數），然後自動展開原本的揪團
                    await loadData();
                    reExpandSignups(gameId);
                } else {
                    const err = await res.text();
                    alert('報名失敗：' + err);
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // 移除報名
        async function removeSignup(signupId, gameId) {
            if (!confirm('確定要移除此報名嗎？')) return;
            try {
                const res = await fetch(`${SIGNUPS_API_URL}/${signupId}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('已成功移除！');
                    await loadData();
                    reExpandSignups(gameId);
                } else {
                    alert('移除失敗');
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // 防抖動
        function debounce(fn, delay) {
            let timer;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // 重新展開指定揪團的報名面板（loadData 重建表格後自動再展開）
        function reExpandSignups(gameId) {
            const btn = document.querySelector(`button[data-game-id="${gameId}"]`);
            if (btn) {
                toggleSignups(gameId, btn);
            }
        }

        function getSignupStatusBadge(status) {
            const map = {
                'JOINED':  '<span class="badge bg-success">已加入</span>',
                'QUITTED': '<span class="badge bg-secondary">已退出</span>',
                'NO_SHOW': '<span class="badge bg-warning text-dark">未到場</span>',
                'KICKED':  '<span class="badge bg-danger">被踢出</span>'
            };
            return map[status] || `<span class="badge bg-secondary">${status}</span>`;
        }
    </script>
</body>
</html>
