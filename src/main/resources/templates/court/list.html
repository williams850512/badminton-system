<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    ============================================================
    球場管理 CRUD 頁面
    ============================================================
    依照 venue/list.html 格式製作
    欄位：ID、所屬場館、球場名稱、狀態、操作
    ============================================================
-->
<head th:replace="~{layout/backend :: head('球場管理')}"></head>
<body>

    <!-- ===== Header 導覽列 ===== -->
    <nav th:replace="~{layout/backend :: header}"></nav>

    <div class="d-flex">
        <!-- ===== Sidebar 側邊欄 ===== -->
        <aside th:replace="~{layout/backend :: sidebar}"></aside>

        <!-- ===== 主內容區 ===== -->
        <main class="main-content">

            <!-- 頁面標題 + 新增按鈕 -->
            <div class="page-header">
                <h2><i class="bi bi-dribbble"></i> 球場管理</h2>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg"></i> 新增球場
                </button>
            </div>

            <!-- 球場資料表格 -->
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="courtTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>所屬場館</th>
                                <th>球場名稱</th>
                                <th>狀態</th>
                                <th style="width: 200px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="loading-row">
                                <td colspan="5">
                                    <div class="spinner-border spinner-border-sm text-primary"></div>
                                    載入中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- ===== Footer ===== -->
    <footer th:replace="~{layout/backend :: footer}"></footer>

    <!-- ===== 新增/編輯 Modal ===== -->
    <div class="modal fade" id="courtModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增球場</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="courtForm">
                        <!-- 隱藏欄位：記錄正在編輯的 ID（新增時為空） -->
                        <input type="hidden" id="editId">

                        <div class="mb-3">
                            <label for="venueId" class="form-label">所屬場館 <span class="text-danger">*</span></label>
                            <select class="form-select" id="venueId" required>
                                <option value="">-- 請選擇場館 --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="courtName" class="form-label">球場名稱 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="courtName"
                                   placeholder="例：A1 羽球場" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveCourt()">
                        <i class="bi bi-check-lg"></i> 儲存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 共用 Scripts ===== -->
    <div th:replace="~{layout/backend :: scripts}"></div>

    <!-- ===== 本頁 JavaScript（AJAX + DOM 操作）===== -->
    <script>
        // ============================================================
        // API 路徑
        // ============================================================
        const API_URL       = '/api/courts';
        const VENUE_API_URL = '/api/venues';

        // Bootstrap Modal 實例
        let courtModal;

        // ============================================================
        // 頁面載入
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            courtModal = new bootstrap.Modal(document.getElementById('courtModal'));
            loadData();
        });

        // ============================================================
        // 【READ】載入所有球場
        // ============================================================
        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `
                <tr class="loading-row">
                    <td colspan="5">
                        <div class="spinner-border spinner-border-sm text-primary"></div> 載入中...
                    </td>
                </tr>`;

            try {
                const response = await fetch(API_URL);     // GET /api/courts
                const courts = await response.json();

                if (courts.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="5" class="text-center text-muted py-4">
                            目前沒有球場資料，請點擊「新增球場」按鈕
                        </td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                courts.forEach(court => {
                    const venueName = court.venue ? court.venue.venueName : '<span class="text-muted">-</span>';
                    tbody.innerHTML += `
                        <tr>
                            <td>${court.courtId}</td>
                            <td>${venueName}</td>
                            <td><strong>${court.courtName}</strong></td>
                            <td>${getStatusBadge(court.status)}</td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-primary" title="編輯"
                                            onclick='openEditModal(${JSON.stringify(court)})'>
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-outline-danger" title="刪除"
                                            onclick="deleteCourt(${court.courtId}, '${court.courtName}')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                    <div class="btn-group btn-group-sm">
                                        <button class="btn btn-outline-secondary dropdown-toggle" 
                                                data-bs-toggle="dropdown" title="變更狀態">
                                            <i class="bi bi-arrow-repeat"></i>
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" href="#" 
                                                   onclick="changeStatus(${court.courtId}, 'ACTIVE')">
                                                <i class="bi bi-check-circle text-success"></i> 可使用
                                            </a></li>
                                            <li><a class="dropdown-item" href="#" 
                                                   onclick="changeStatus(${court.courtId}, 'MAINTENANCE')">
                                                <i class="bi bi-tools text-warning"></i> 維護中
                                            </a></li>
                                            <li><a class="dropdown-item" href="#" 
                                                   onclick="changeStatus(${court.courtId}, 'INACTIVE')">
                                                <i class="bi bi-x-circle text-danger"></i> 停用
                                            </a></li>
                                        </ul>
                                    </div>
                                </div>
                            </td>
                        </tr>`;
                });

            } catch (error) {
                tbody.innerHTML = `
                    <tr><td colspan="5" class="text-center text-danger py-4">
                        <i class="bi bi-exclamation-triangle"></i> 載入失敗：${error.message}
                        <br><button class="btn btn-sm btn-outline-primary mt-2" onclick="loadData()">重試</button>
                    </td></tr>`;
            }
        }

        // ============================================================
        // 狀態 Badge 對應
        // ============================================================
        function getStatusBadge(status) {
            const map = {
                'ACTIVE':      '<span class="badge badge-active">可使用</span>',
                'INACTIVE':    '<span class="badge badge-inactive">已停用</span>',
                'MAINTENANCE': '<span class="badge badge-maintenance">維護中</span>'
            };
            return map[status] || `<span class="badge bg-secondary">${status}</span>`;
        }

        // ============================================================
        // 載入場館下拉選單（供 Modal 使用）
        // ============================================================
        async function loadVenueOptions() {
            const select = document.getElementById('venueId');
            // 保留第一個「請選擇」選項，清掉後面的
            select.innerHTML = '<option value="">-- 請選擇場館 --</option>';

            try {
                const response = await fetch(VENUE_API_URL);   // GET /api/venues
                const venues = await response.json();
                venues.forEach(venue => {
                    // 只列出營業中的場館
                    if (venue.status === 'ACTIVE') {
                        select.innerHTML += `<option value="${venue.venueId}">${venue.venueName}</option>`;
                    }
                });
            } catch (error) {
                console.error('載入場館清單失敗', error);
            }
        }

        // ============================================================
        // 【CREATE】打開新增 Modal
        // ============================================================
        async function openCreateModal() {
            document.getElementById('modalTitle').textContent = '新增球場';
            document.getElementById('courtForm').reset();   // 清空表單
            document.getElementById('editId').value = '';    // 清空 ID
            await loadVenueOptions();                        // 重新載入場館下拉
            courtModal.show();
        }

        // ============================================================
        // 【UPDATE】打開編輯 Modal（帶入舊資料）
        // ============================================================
        async function openEditModal(court) {
            document.getElementById('modalTitle').textContent = '編輯球場';
            document.getElementById('editId').value = court.courtId;
            await loadVenueOptions();                        // 重新載入場館下拉
            document.getElementById('venueId').value = court.venue ? court.venue.venueId : '';
            document.getElementById('courtName').value = court.courtName;
            courtModal.show();
        }

        // ============================================================
        // 【CREATE / UPDATE】儲存（根據有無 ID 判斷新增或更新）
        // ============================================================
        async function saveCourt() {
            const id = document.getElementById('editId').value;
            const data = {
                courtName: document.getElementById('courtName').value.trim(),
                venue:     { venueId: parseInt(document.getElementById('venueId').value) }
            };

            // 簡易前端驗證
            if (!data.courtName) {
                alert('請輸入球場名稱！');
                return;
            }
            if (!document.getElementById('venueId').value) {
                alert('請選擇所屬場館！');
                return;
            }

            try {
                let response;
                if (id) {
                    // 有 ID → PUT 更新
                    response = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    // 沒 ID → POST 新增
                    response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                if (response.ok) {
                    courtModal.hide();              // 關閉 Modal
                    loadData();                     // 重新載入表格
                    alert(id ? '更新成功！' : '新增成功！');
                } else {
                    const err = await response.text();
                    alert('操作失敗：' + err);
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // ============================================================
        // 【DELETE】刪除球場
        // ============================================================
        async function deleteCourt(id, name) {
            if (!confirm(`確定要刪除「${name}」嗎？`)) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadData();                     // 重新載入表格
                    alert('刪除成功！');
                } else {
                    alert('刪除失敗');
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // ============================================================
        // 【PATCH】變更狀態
        // ============================================================
        async function changeStatus(id, newStatus) {
            try {
                const response = await fetch(`${API_URL}/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    loadData();                     // 重新載入表格
                } else {
                    alert('狀態更新失敗');
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }
    </script>

</body>
</html>
