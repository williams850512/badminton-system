<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    ============================================================
    會員管理 CRUD 頁面
    ============================================================
    【組員模板說明】複製這個檔案後，只需修改：
    1. head 裡的頁面標題
    2. page-header 區的標題和按鈕文字
    3. 表格的欄位（thead + tbody 渲染）
    4. Modal 表單的欄位
    5. JavaScript 裡的 API 路徑和欄位名稱
    ============================================================
-->
<head th:replace="~{layout/backend :: head('會員管理')}"></head>
<body>

    <!-- ===== Header 導覽列 ===== -->
    <nav th:replace="~{layout/backend :: header}"></nav>

    <div class="d-flex">
        <!-- ===== Sidebar 側邊欄 ===== -->
        <aside th:replace="~{layout/backend :: sidebar}"></aside>

        <!-- ===== 主內容區（只改這裡面！）===== -->
        <main class="main-content">

            <!-- 頁面標題 + 搜尋列 + 新增按鈕 -->
            <div class="page-header">
                <h2><i class="bi bi-people"></i> 會員管理</h2>
                <div class="d-flex gap-2">
                    <input type="text" class="form-control form-control-sm" id="searchKeyword"
                           placeholder="搜尋 ID、帳號、姓名..." style="width: 220px;">
                    <button class="btn btn-outline-secondary btn-sm" onclick="searchMembers()">
                        <i class="bi bi-search"></i> 搜尋
                    </button>
                    <button class="btn btn-outline-warning btn-sm" id="btnClear"
                            onclick="resetSearch()" style="display: none;">
                        <i class="bi bi-x-lg"></i> 清除
                    </button>
                    <a th:if="${session.adminUser != null and session.adminUser.role.name() == 'MANAGER'}"
                       href="/admin" class="btn btn-secondary btn-sm">
                        <i class="bi bi-person-badge"></i> 職員管理
                    </a>
                    <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
                        <i class="bi bi-plus-lg"></i> 新增會員
                    </button>
                </div>
            </div>

            <!-- 會員資料表格 -->
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="memberTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>帳號 / 姓名</th>
                                <th>等級</th>
                                <th>性別 / 生日</th>
                                <th>聯絡資訊</th>
                                <th>創建時間</th>
                                <th>狀態</th>
                                <th style="width: 200px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="loading-row">
                                <td colspan="8">
                                    <div class="spinner-border spinner-border-sm text-primary"></div>
                                    載入中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- ===== Footer ===== -->
    <footer th:replace="~{layout/backend :: footer}"></footer>

    <!-- ===== 新增/編輯 Modal ===== -->
    <div class="modal fade" id="memberModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增會員</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="memberForm">
                        <!-- 隱藏欄位：記錄正在編輯的 ID（新增時為空） -->
                        <input type="hidden" id="editId">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">帳號 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="username"
                                       placeholder="請輸入登入帳號" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label">密碼 <span class="text-danger" id="pwdRequired">*</span></label>
                                <input type="password" class="form-control" id="password"
                                       placeholder="編輯時留空則不修改">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="fullName" class="form-label">姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="fullName"
                                       placeholder="請輸入姓名" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="gender" class="form-label">性別 <span class="text-danger">*</span></label>
                                <select class="form-select" id="gender" required>
                                    <option value="男">男</option>
                                    <option value="女">女</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="membershipLevel" class="form-label">會員等級 <span class="text-danger">*</span></label>
                                <select class="form-select" id="membershipLevel" required>
                                    <option value="NORMAL">一般會員</option>
                                    <option value="VIP">VIP 會員</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="birthday" class="form-label">生日 <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="birthday" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="phone" class="form-label">電話 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="phone"
                                       placeholder="09xx-xxx-xxx" maxlength="12" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="email"
                                       placeholder="example@mail.com" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="saveMember()">
                        <i class="bi bi-check-lg"></i> 儲存
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 共用 Scripts ===== -->
    <div th:replace="~{layout/backend :: scripts}"></div>

    <!-- ===== 本頁 JavaScript（AJAX + DOM 操作）===== -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:inline="javascript">
        // ============================================================
        // API 路徑（修改這裡就能套用到其他模組）
        // ============================================================
        const API_URL = '/api/admins/member';

        // 目前登入者角色（用於權限判斷）
        const currentRole = /*[[${session.adminUser != null ? session.adminUser.role : 'staff'}]]*/ 'staff';
        const isManager = (currentRole === 'MANAGER');

        // Bootstrap Modal 實例
        let memberModal;

        // ============================================================
        // 頁面載入
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            memberModal = new bootstrap.Modal(document.getElementById('memberModal'));
            loadData();

            // 支援 Enter 鍵搜尋
            document.getElementById('searchKeyword').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') searchMembers();
            });

            // 電話自動帶入橫線 09xx-xxx-xxx
            const phoneInput = document.getElementById('phone');
            let isFormatting = false;  // 防止重複觸發
            let isComposing = false;   // 偵測中文輸入法（IME）組字狀態

            // 中文輸入法開始組字時，暫停格式化
            phoneInput.addEventListener('compositionstart', function() {
                isComposing = true;
            });

            // 中文輸入法結束組字後，恢復格式化並立即執行一次
            phoneInput.addEventListener('compositionend', function(e) {
                isComposing = false;
                formatPhone(e);  // 組字結束後手動觸發格式化
            });

            phoneInput.addEventListener('input', function(e) {
                if (isComposing) return;  // IME 組字中，跳過
                formatPhone(e);
            });

            function formatPhone(e) {
                if (isFormatting) return;
                isFormatting = true;

                let v = e.target.value.replace(/\D/g, '');  // 只保留數字
                if (v.length > 10) v = v.substring(0, 10);  // 最多 10 位
                let f = '';
                if (v.length > 0) f = v.substring(0, 4);
                if (v.length > 4) f += '-' + v.substring(4, 7);
                if (v.length > 7) f += '-' + v.substring(7, 10);

                const cursorPos = f.length;
                e.target.value = f;
                e.target.setSelectionRange(cursorPos, cursorPos);

                isFormatting = false;
            }

            // 日期選取完畢自動關閉
            document.getElementById('birthday').addEventListener('change', function() {
                this.blur();
            });
        });

        // ============================================================
        // 【READ】載入所有會員
        // ============================================================
        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `
                <tr class="loading-row">
                    <td colspan="8">
                        <div class="spinner-border spinner-border-sm text-primary"></div> 載入中...
                    </td>
                </tr>`;

            try {
                const response = await fetch(API_URL);     // GET /api/admin/member
                const members = await response.json();

                if (members.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="8" class="text-center text-muted py-4">
                            目前沒有會員資料，請點擊「新增會員」按鈕
                        </td></tr>`;
                    return;
                }

                renderTable(members);

            } catch (error) {
                tbody.innerHTML = `
                    <tr><td colspan="8" class="text-center text-danger py-4">
                        <i class="bi bi-exclamation-triangle"></i> 載入失敗：${error.message}
                        <br><button class="btn btn-sm btn-outline-primary mt-2" onclick="loadData()">重試</button>
                    </td></tr>`;
            }
        }

        // ============================================================
        // 【SEARCH】搜尋會員
        // ============================================================
        async function searchMembers() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            if (!keyword) { loadData(); return; }

            try {
                const response = await fetch(`${API_URL}/search?keyword=${encodeURIComponent(keyword)}`);
                const data = await response.json();
                renderTable(data);
                document.getElementById('btnClear').style.display = 'inline-block';
            } catch (error) {
                alert('搜尋失敗：' + error.message);
            }
        }

        function resetSearch() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('btnClear').style.display = 'none';
            loadData();
        }

        // ============================================================
        // 渲染表格（loadData 和 searchMembers 共用）
        // ============================================================
        function renderTable(members) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            members.forEach(m => {
                const noteEscaped = (m.note || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                tbody.innerHTML += `
                    <tr>
                        <td>${m.memberId}</td>
                        <td>
                            <strong>${m.username}</strong>
                            <div class="text-muted small">${m.fullName || ''}</div>
                        </td>
                        <td>${getLevelBadge(m.membershipLevel)}</td>
                        <td>
                            <div>${m.gender || '<span class="text-muted">-</span>'}</div>
                            <div class="text-muted small">${m.birthday || '-'}</div>
                        </td>
                        <td>
                            <div class="small">📱 ${m.phone || '-'}</div>
                            <div class="text-muted small">📧 ${m.email || '-'}</div>
                        </td>
                        <td class="small">${m.createdAt || '-'}</td>
                        <td>${getStatusBadge(m.status)}</td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-primary" title="編輯"
                                        onclick="openEditModal(${m.memberId})">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-outline-info" title="備註"
                                        onclick="showNote(${m.memberId}, '${m.fullName || m.username}', '${noteEscaped}')">
                                    <i class="bi bi-sticky"></i>
                                </button>
                                <button class="btn btn-outline-danger" title="刪除"
                                        onclick="deleteMember(${m.memberId}, '${m.username}')"
                                        ${!isManager ? 'disabled' : ''}>
                                    <i class="bi bi-trash"></i>
                                </button>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-secondary dropdown-toggle"
                                            data-bs-toggle="dropdown" title="變更狀態"
                                            ${!isManager ? 'disabled' : ''}>
                                        <i class="bi bi-arrow-repeat"></i>
                                    </button>
                                    <ul class="dropdown-menu">
                                        <li><a class="dropdown-item" href="#"
                                               onclick="changeStatus(${m.memberId}, 'ACTIVE')">
                                            <i class="bi bi-check-circle text-success"></i> 正常
                                        </a></li>
                                        <li><a class="dropdown-item" href="#"
                                               onclick="changeStatus(${m.memberId}, 'INACTIVE')">
                                            <i class="bi bi-x-circle text-danger"></i> 停權
                                        </a></li>
                                    </ul>
                                </div>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        // ============================================================
        // 狀態 Badge 對應
        // ============================================================
        function getStatusBadge(status) {
            const map = {
                'ACTIVE':   '<span class="badge badge-active">正常</span>',
                'INACTIVE': '<span class="badge badge-inactive">停權</span>'
            };
            return map[status] || `<span class="badge bg-secondary">${status}</span>`;
        }

        function getLevelBadge(level) {
            if (level === 'VIP') return '<span class="badge bg-warning text-dark">💎 VIP</span>';
            return '<span class="badge bg-light text-dark border">👤 一般</span>';
        }

        // ============================================================
        // 【CREATE】打開新增 Modal
        // ============================================================
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '新增會員';
            document.getElementById('memberForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('username').disabled = false;
            // 一般職員無權修改會員等級
            document.getElementById('fullName').disabled = false;
            document.getElementById('gender').disabled = false;
            document.getElementById('membershipLevel').disabled = !isManager;
            document.getElementById('pwdRequired').style.display = '';
            memberModal.show();
        }

        // ============================================================
        // 【UPDATE】打開編輯 Modal（透過 API 取得資料）
        // ============================================================
        async function openEditModal(memberId) {
            try {
                const response = await fetch(`${API_URL}/${memberId}`);
                if (!response.ok) { Swal.fire('失敗', '無法取得會員資料', 'error'); return; }
                const member = await response.json();

                document.getElementById('modalTitle').textContent = '編輯會員';
                document.getElementById('editId').value = member.memberId;
                document.getElementById('username').value = member.username;
                document.getElementById('username').disabled = true;
                document.getElementById('password').value = '';
                document.getElementById('pwdRequired').style.display = 'none';
                document.getElementById('fullName').value = member.fullName || '';
                document.getElementById('fullName').disabled = false;
                document.getElementById('gender').value = member.gender || '';
                document.getElementById('gender').disabled = false;
                document.getElementById('membershipLevel').value = member.membershipLevel || 'NORMAL';
                document.getElementById('membershipLevel').disabled = !isManager;
                document.getElementById('birthday').value = member.birthday || '';
                document.getElementById('phone').value = member.phone || '';
                document.getElementById('email').value = member.email || '';
                memberModal.show();
            } catch (error) {
                Swal.fire('錯誤', '請求失敗：' + error.message, 'error');
            }
        }

        // ============================================================
        // 【CREATE / UPDATE】儲存（根據有無 ID 判斷新增或更新）
        // ============================================================
        async function saveMember() {
            const id = document.getElementById('editId').value;
            const data = {
                username:        document.getElementById('username').value.trim(),
                fullName:        document.getElementById('fullName').value.trim(),
                gender:          document.getElementById('gender').value,
                membershipLevel: document.getElementById('membershipLevel').value,
                birthday:        document.getElementById('birthday').value || null,
                phone:           document.getElementById('phone').value.trim(),
                email:           document.getElementById('email').value.trim()
            };

            const pwd = document.getElementById('password').value;
            if (pwd) data.password = pwd;

            // 前端驗證
            if (!data.username || !data.fullName || !data.gender || !data.birthday || !data.phone || !data.email) {
                Swal.fire('提示', '請填寫所有必填欄位！', 'warning');
                return;
            }
            if (!id && !pwd) {
                Swal.fire('提示', '新增會員時請設定密碼！', 'warning');
                return;
            }
            // 電話驗證：必須為 09 開頭的 10 位數字
            const phoneDigits = data.phone.replace(/\D/g, '');
            if (phoneDigits.length !== 10 || !phoneDigits.startsWith('09')) {
                Swal.fire('提示', '電話格式錯誤！必須為 09 開頭的 10 位數字', 'warning');
                return;
            }
            // Email 驗證：必須包含 @ 且格式為 xxx@xxx
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) {
                Swal.fire('提示', 'Email 格式錯誤！請輸入正確格式（例：abc@mail.com）', 'warning');
                return;
            }

            try {
                let response;
                if (id) {
                    // 有 ID → PUT 更新
                    response = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    // 沒 ID → POST 新增（走註冊 API）
                    response = await fetch('/api/members/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                if (response.ok) {
                    memberModal.hide();
                    loadData();
                    Swal.fire('成功', id ? '會員更新成功！' : '會員新增成功！', 'success');
                } else {
                    const err = await response.text();
                    Swal.fire('失敗', '操作失敗：' + err, 'error');
                }
            } catch (error) {
                Swal.fire('錯誤', '請求失敗：' + error.message, 'error');
            }
        }

        // ============================================================
        // 【DELETE】刪除會員
        // ============================================================
        async function deleteMember(id, name) {
            const result = await Swal.fire({
                title: '確定要刪除嗎？',
                text: `即將移除會員「${name}」，此操作無法撤銷！`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                confirmButtonText: '確定刪除',
                cancelButtonText: '取消'
            });

            if (!result.isConfirmed) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    Swal.fire('已刪除', '會員已移除', 'success');
                    loadData();
                } else {
                    Swal.fire('失敗', '刪除失敗', 'error');
                }
            } catch (error) {
                Swal.fire('錯誤', '請求失敗：' + error.message, 'error');
            }
        }

        // ============================================================
        // 【PATCH】變更狀態
        // ============================================================
        async function changeStatus(id, newStatus) {
            try {
                const response = await fetch(`${API_URL}/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    loadData();
                    Swal.fire('成功', '狀態已更新', 'success');
                } else {
                    Swal.fire('失敗', '狀態更新失敗', 'error');
                }
            } catch (error) {
                Swal.fire('錯誤', '請求失敗：' + error.message, 'error');
            }
        }

        // ============================================================
        // 【PATCH】會員備註
        // ============================================================
        async function showNote(id, name, currentNote) {
            const displayNote = (currentNote === 'null' || !currentNote) ? '' : currentNote;
            const result = await Swal.fire({
                title: '會員備註：' + name,
                input: 'textarea',
                inputValue: displayNote,
                showCancelButton: true,
                confirmButtonText: '儲存',
                cancelButtonText: '取消'
            });

            if (!result.isConfirmed) return;

            try {
                const response = await fetch(`${API_URL}/${id}/note`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note: result.value })
                });
                if (response.ok) {
                    Swal.fire('成功', '備註已更新', 'success');
                    loadData();
                } else {
                    Swal.fire('失敗', '備註更新失敗', 'error');
                }
            } catch (error) {
                Swal.fire('錯誤', '請求失敗：' + error.message, 'error');
            }
        }
    </script>

</body>
</html>
