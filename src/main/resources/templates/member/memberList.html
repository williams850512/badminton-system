<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>羽球館 | 會員管理中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f7f6; margin: 0; }
        .app-container { display: flex; min-height: 100vh; }
        .main-content { flex: 1; padding: 20px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; }
        
        /* 表格風格 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #333; }
        
        /* 按鈕風格 */
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-warning { background-color: #f1c40f; color: #333; }
        .btn-info { background-color: #2ecc71; color: white; }

        /* 搜尋列 */
        .search-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .form-control { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; }
        
        /* 標籤樣式 */
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-vip { background-color: #f1c40f; color: #000; }
        .badge-normal { background-color: #bdc3c7; color: #fff; }
        .status-active { color: #2ecc71; font-weight: bold; }
        .status-suspended { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-content">
        <h2 style="margin-bottom: 20px; color: #333;">🏸 會員管理中心</h2>
        
        <div class="card">
            <div class="search-bar">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="memberKeyword" class="form-control" placeholder="搜尋 ID、帳號、姓名...">
                    <button onclick="searchMembers()" class="btn btn-primary">🔍 搜尋</button>
                    <button id="btnClear" onclick="resetSearch()" class="btn btn-warning" style="display: none;">✕ 清除</button>
                </div>
                
                <div>
                    <a href="/admin/list" class="btn" style="background: #95a5a6; color:white;">⚙️ 職員管理</a>
                    <a href="/member/add" class="btn btn-primary">＋ 新增會員</a>
                </div>
            </div>

            <table id="memberTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>帳號 / 姓名</th>
                        <th>等級</th>
                        <th>性別 / 生日</th>
                        <th>聯絡資訊</th>
                        <th>創建時間</th>
                        <th>狀態</th>
                        <th style="text-align: center;">操作</th>
                    </tr>
                </thead>
                <tbody id="memberListData">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 頁面載入自動讀取
    window.onload = loadMembers;

    function loadMembers() {
        fetch('/api/admin/members')
            .then(res => res.json())
            .then(data => renderTable(data));
    }

    function searchMembers() {
        const keyword = document.getElementById('memberKeyword').value.trim();
        if (!keyword) { loadMembers(); return; }

        fetch(`/api/admin/members/search?keyword=${encodeURIComponent(keyword)}`)
            .then(res => res.json())
            .then(data => {
                renderTable(data);
                document.getElementById('btnClear').style.display = 'inline-block';
            });
    }

    function renderTable(data) {
        const tbody = document.getElementById('memberListData');
        tbody.innerHTML = '';

        data.forEach(m => {
            const noteEscaped = (m.note || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const row = `
                <tr>
                    <td>#${m.memberId}</td>
                    <td>
                        <div style="font-weight: bold;">${m.username}</div>
                        <div style="font-size: 12px; color: #7f8c8d;">${m.fullName}</div>
                    </td>
                    <td>
                        <span class="badge ${m.membershipLevel === 'VIP' ? 'badge-vip' : 'badge-normal'}">
                            ${m.membershipLevel === 'VIP' ? 'VIP' : '一般'}
                        </span>
                    </td>
                    <td>
                        <div>${m.gender || '未填'}</div>
                        <div style="font-size: 12px; color: #7f8c8d;">🎂 ${m.birthday ? m.birthday : '未填'}</div>
                    </td>
                    <td>
                        <div style="font-size: 13px;">📱 ${m.phone || ''}</div>
                        <div style="font-size: 12px; color: #7f8c8d;">📧 ${m.email || ''}</div>
                    </td>
                    <td style="font-size: 12px;">${m.createdAt || '---'}</td>
                    <td>
                        <span class="${m.status === 'Active' ? 'status-active' : 'status-suspended'}">
                            ${m.status === 'Active' ? '● 正常' : '● 停權'}
                        </span>
                    </td>
                    <td style="text-align: center;">
                        <div style="display: flex; gap: 5px; justify-content: center;">
                            <button class="btn btn-warning" onclick="location.href='/member/edit?id=${m.memberId}'" style="padding: 4px 10px; font-size: 12px;">編輯</button>
                            <button class="btn btn-info" onclick="showNote(${m.memberId}, '${m.fullName}', '${noteEscaped}')" style="padding: 4px 10px; font-size: 12px;">備註</button>
                            <button class="btn btn-danger" onclick="confirmDelete(${m.memberId}, '${m.username}')" style="padding: 4px 10px; font-size: 12px;">刪除</button>
                        </div>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // 支援 Enter 鍵搜尋
    document.getElementById('memberKeyword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') searchMembers();
    });

    function resetSearch() {
        document.getElementById('memberKeyword').value = '';
        document.getElementById('btnClear').style.display = 'none';
        loadMembers();
    }

    function confirmDelete(id, username) {
        Swal.fire({
            title: '確定要刪除嗎？',
            text: `你即將移除會員「${username}」，此動作無法復原！`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e74c3c',
            confirmButtonText: '確定刪除'
        }).then((result) => {
            if (result.isConfirmed) {
                fetch(`/api/admin/members/${id}`, { method: 'DELETE' })
                    .then(res => {
                        if (res.ok) {
                            Swal.fire('已刪除', '會員已移除', 'success').then(() => loadMembers());
                        }
                    });
            }
        });
    }

    function showNote(id, name, currentNote) {
        const displayNote = (currentNote === 'null' || !currentNote) ? '' : currentNote;
        Swal.fire({
            title: '會員備註：' + name,
            input: 'textarea',
            inputValue: displayNote,
            showCancelButton: true,
            confirmButtonText: '儲存更新'
        }).then((result) => {
            if (result.isConfirmed) {
                fetch(`/api/admin/members/${id}/note`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note: result.value })
                }).then(res => {
                    if (res.ok) {
                        Swal.fire('成功', '備註已更新', 'success').then(() => loadMembers());
                    } else {
                        Swal.fire('失敗', '備註更新失敗', 'error');
                    }
                });
            }
        });
    }
</script>
</body>
</html>
