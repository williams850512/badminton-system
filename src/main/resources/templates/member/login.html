<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>羽球館 | 會員登入</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Noto Sans TC', sans-serif;
        }

        .login-card { 
            background: #fff; 
            padding: 45px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
        }

        .login-header { text-align: center; margin-bottom: 35px; }
        .login-header h2 { color: #2c3e50; font-size: 26px; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
        .login-header p { color: #7f8c8d; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; font-size: 14px; }
        label span { font-weight: normal; color: #95a5a6; font-size: 12px; margin-left: 5px; }
        
        .form-control { 
            width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 6px; 
            font-size: 15px; outline: none; transition: all 0.3s; background-color: #f9f9f9;
            box-sizing: border-box;
        }
        .form-control:focus { border-color: #3498db; background-color: #fff; box-shadow: 0 0 8px rgba(52, 152, 219, 0.2); }

        .btn-login { 
            width: 100%; padding: 14px; background: #3498db; color: white; border: none; 
            border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; letter-spacing: 1px;
        }
        .btn-login:hover { background: #2980b9; transform: translateY(-1px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        .msg-box { padding: 12px; border-radius: 6px; font-size: 14px; text-align: center; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .msg-success { background-color: #f0fdf4; color: #10b981; border: 1px solid #dcfce7; }
        .msg-error { background-color: #fdf2f2; color: #e74c3c; border: 1px solid #fadbd8; animation: shake 0.4s ease-in-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .footer-links { margin-top: 30px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; color: #7f8c8d; font-size: 14px; }
        .footer-links a { color: #3498db; text-decoration: none; font-weight: bold; transition: 0.2s; }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <h2>會員登入</h2>
        <p>Badminton Member</p>
    </div>
    
    <div th:if="${param.status != null and param.status[0] == 'ok'}" class="msg-box msg-success">
        <span>✔</span> 註冊成功！請直接登入
    </div>
    
    <div th:if="${param.error != null and param.error[0] == '1'}" class="msg-box msg-error">
        <span>❌</span> 帳號或密碼錯誤
    </div>
    
    <div th:if="${param.error != null and param.error[0] == 'need_login'}" class="msg-box msg-error">
        <span>🔒</span> 請先登入會員以繼續操作
    </div>

    <form id="memberLoginForm">
        <div class="form-group">
            <label>帳號 <span>Username</span></label>
            <input type="text" id="username" name="username" class="form-control" 
                   placeholder="請輸入您的帳號" required autofocus autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>密碼 <span>Password</span></label>
            <input type="password" id="password" name="password" class="form-control" 
                   placeholder="請輸入您的密碼" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn-login">登入</button>
    </form>
    
    <div class="footer-links">
        還不是會員？<a href="/member/register">點此註冊</a>
    </div>
</div>

<script th:inline="javascript">
    document.getElementById('memberLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const loginData = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        fetch('/api/member/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(loginData)
        })
        .then(async response => {
            if (response.ok) {
                // 會員登入成功，導向個人資料頁 (或場地預約頁)
                window.location.href = '/member/profile';
            } else {
                // 登入失敗，導回登入頁帶 error
                window.location.href = '/member/login?error=1';
            }
        })
        .catch(err => {
            console.error('Error:', err);
            alert('系統連線異常');
        });
    });
</script>

</body>
</html>
