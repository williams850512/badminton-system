<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>羽球館 | 會員註冊</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        body { 
            background-color: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 20px;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .reg-card { 
            background: #fff; 
            padding: 45px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
        }

        .reg-header { text-align: center; margin-bottom: 30px; }
        .reg-header h2 { color: #2c3e50; font-size: 26px; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .reg-header p { color: #7f8c8d; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; font-size: 14px; }
        label span { font-weight: normal; color: #95a5a6; font-size: 12px; margin-left: 5px; }
        
        .form-control { 
            width: 100%; padding: 11px 15px; border: 1px solid #ddd; border-radius: 6px; 
            font-size: 15px; outline: none; transition: all 0.3s; background-color: #f9f9f9;
            box-sizing: border-box;
        }
        .form-control:focus { border-color: #3498db; background-color: #fff; box-shadow: 0 0 8px rgba(52, 152, 219, 0.2); }

        .radio-group { display: flex; gap: 30px; padding: 5px 0; }
        .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 15px; color: #555; }
        .radio-item input { accent-color: #3498db; width: 17px; height: 17px; }

        .btn-reg { 
            width: 100%; padding: 14px; background: #3498db; color: white; border: none; 
            border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; letter-spacing: 1px; margin-top: 10px;
        }
        .btn-reg:hover { background: #2980b9; transform: translateY(-1px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2); }

        .msg-error {
            background-color: #fdf2f2; color: #e74c3c; border: 1px solid #fadbd8;
            padding: 12px; border-radius: 6px; font-size: 14px; text-align: center; 
            margin-bottom: 25px; display: flex; align-items: center; justify-content: center; 
            gap: 8px; animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .footer-links { margin-top: 25px; text-align: center; border-top: 1px solid #eee; padding-top: 20px; color: #7f8c8d; font-size: 14px; }
        .footer-links a { color: #3498db; text-decoration: none; font-weight: bold; transition: 0.2s; }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="reg-card">
    <div class="reg-header">
        <h2>會員註冊</h2>
        <p>Create Your Account</p>
    </div>
    
    <div th:if="${param.error != null and param.error[0] == '2'}" class="msg-error">
        <span>❌</span> 帳號已存在，請更換帳號
    </div>
    <div th:if="${param.error != null and param.error[0] == '1'}" class="msg-error">
        <span>❌</span> 註冊失敗，請檢查輸入內容
    </div>

    <form id="registerForm">
        <div class="form-group">
            <label>設定帳號 <span>Username</span></label>
            <input type="text" name="username" id="username" class="form-control" 
                   required placeholder="請輸入登入帳號" autofocus autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>設定密碼 <span>Password</span></label>
            <input type="password" name="password" id="password" class="form-control" 
                   required placeholder="請設定 6 位以上密碼" autocomplete="new-password">
        </div>
        
        <div class="form-group">
            <label>姓名 <span>Full Name</span></label>
            <input type="text" name="fullName" id="fullName" class="form-control" 
                   required placeholder="請輸入您的姓名" autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>性別 <span>Gender</span></label>
            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="gender" value="男" checked required> 男
                </label>
                <label class="radio-item">
                    <input type="radio" name="gender" value="女"> 女
                </label>
            </div>
        </div>
        
        <div class="form-group">
            <label>生日 <span>Birthday</span></label>
            <input type="text" name="birthday" id="birthdayPicker" 
                   class="form-control" placeholder="請選取日期" readonly>
        </div>
        
        <div class="form-group">
            <label>電話 <span>Phone</span></label>
            <input type="text" name="phone" id="phone" class="form-control" 
                   maxlength="12" placeholder="09xx-xxx-xxx" required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label>電子信箱 <span>Email</span></label>
            <input type="email" name="email" id="email" class="form-control" 
                   placeholder="example@mail.com" autocomplete="off">
        </div>
        
        <button type="submit" class="btn-reg">立即註冊並加入</button>
    </form>
    
    <div class="footer-links">
        已經有帳號了？<a href="/member/login">返回登入畫面</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>

<script>
    // 初始化日期選擇器
    flatpickr("#birthdayPicker", {
        locale: "zh_tw",
        dateFormat: "Y-m-d",
        maxDate: "today",
        monthSelectorType: "dropdown",
        disableMobile: "true"
    });

    // 手機格式自動補橫線
    const phoneInput = document.getElementById('phone');
    phoneInput.addEventListener('input', function (e) {
        let v = e.target.value.replace(/\D/g, ''); 
        let f = '';
        if (v.length > 0) {
            f = v.substring(0, 4); 
            if (v.length > 4) f += '-' + v.substring(4, 7); 
            if (v.length > 7) f += '-' + v.substring(7, 11);
        }
        e.target.value = f;
    });

    // 提交註冊表單 — 修正 charset 編碼
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const jsonData = Object.fromEntries(formData.entries());

        fetch('/api/members/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify(jsonData)
        })
        .then(res => {
            if (res.ok) {
                // 註冊成功，跳轉回登入頁面並帶上成功訊息
                window.location.href = '/member/login?status=ok';
            } else if (res.status === 400) {
                // 帳號重複 (Service 回傳 400)
                window.location.href = '/member/register?error=2';
            } else {
                // 其他錯誤
                window.location.href = '/member/register?error=1';
            }
        });
    });
</script>
</body>
</html>
