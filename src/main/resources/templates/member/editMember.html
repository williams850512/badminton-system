<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>羽球館 | 編輯會員資料</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_green.css">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f7f6; margin: 0; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 30px; max-width: 800px; margin: 50px auto; }
        .form-section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .section-title { font-size: 16px; font-weight: bold; color: #3498db; margin-bottom: 15px; display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .form-control { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; transition: 0.2s; }
        .form-control:focus { border-color: #3498db; outline: none; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
        .form-control:disabled { background-color: #f8f9fa; cursor: not-allowed; border-style: dashed; }
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; justify-content: flex-end; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; font-size: 14px; }
        .btn-primary { background-color: #3498db; color: white; min-width: 120px; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .help-text { font-size: 12px; color: #94a3b8; margin-top: 5px; }
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .error { background: #fde2e2; color: #ea4335; }
        .success { background: #e6f4ea; color: #34a853; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom: 25px; color: #2c3e50;">📝 編輯會員資料</h2>
    <div id="message"></div>

    <form id="editMemberForm">
        <input type="hidden" name="memberId" id="memberId">

        <div class="form-section">
            <span class="section-title">帳號資訊</span>
            <div class="form-group">
                <label>會員帳號 Username</label>
                <input type="text" id="username" class="form-control" disabled>
            </div>
        </div>

        <div class="form-section">
            <span class="section-title">個人資訊</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>姓名 Name</label>
                    <input type="text" name="fullName" id="fullName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>性別 Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="男" id="genderM"> 男</label>
                        <label><input type="radio" name="gender" value="女" id="genderF"> 女</label>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>生日 Birthday</label>
                    <input type="text" id="birthdayPicker" name="birthday" class="form-control" readonly>
                </div>
                <div class="form-group">
                    <label>電話 Phone</label>
                    <input type="tel" id="phoneInput" name="phone" class="form-control" placeholder="09XX-XXX-XXX" maxlength="12">
                </div>
            </div>

            <div class="form-group">
                <label>電子信箱 Email</label>
                <input type="email" name="email" id="email" class="form-control">
            </div>
        </div>

        <div class="form-section">
            <span class="section-title">權限與備註</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>帳號狀態 Status</label>
                    <select name="status" id="status" class="form-control">
                        <option value="Active">正常 (Active)</option>
                        <option value="Suspended">停權 (Suspended)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>會員等級 Level</label>
                    <select name="membershipLevel" id="membershipLevel" class="form-control">
                        <option value="Normal">一般會員 (Normal)</option>
                        <option value="VIP">VIP 會員 (VIP)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>備註 Note</label>
                <textarea name="note" id="note" class="form-control" rows="3" style="resize: vertical;"></textarea>
            </div>
        </div>

        <div class="btn-group">
            <a href="/member/list" class="btn btn-secondary">取消返回</a>
            <button type="submit" class="btn btn-primary">儲存更新</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    const birthdayPicker = flatpickr("#birthdayPicker", { dateFormat: "Y-m-d", maxDate: "today" });

    // 1. 從網址取得會員 ID
    const urlParams = new URLSearchParams(window.location.search);
    const memberId = urlParams.get('id');

    // 2. 頁面載入時抓取資料 — 修正為正確的 API 路徑
    window.onload = function() {
        if (!memberId) {
            alert("無效的會員 ID");
            window.location.href = "/member/list";
            return;
        }

        fetch(`/api/admin/members/${memberId}`)
            .then(res => {
                if (!res.ok) throw new Error('找不到該會員');
                return res.json();
            })
            .then(m => {
                document.getElementById('memberId').value = m.memberId;
                document.getElementById('username').value = m.username || '';
                document.getElementById('fullName').value = m.fullName || '';
                document.getElementById('email').value = m.email || '';
                document.getElementById('phoneInput').value = m.phone || '';
                document.getElementById('note').value = m.note || '';
                document.getElementById('status').value = m.status || 'Active';
                document.getElementById('membershipLevel').value = m.membershipLevel || 'Normal';
                if (m.birthday) birthdayPicker.setDate(m.birthday);
                if (m.gender === '男') document.getElementById('genderM').checked = true;
                else if (m.gender === '女') document.getElementById('genderF').checked = true;
            })
            .catch(err => {
                console.error(err);
                alert('載入會員資料失敗');
                window.location.href = '/member/list';
            });
    };

    // 3. 電話格式化
    document.getElementById('phoneInput').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '');
        let formattedValue = '';
        if (value.length > 0) formattedValue += value.substring(0, 4); 
        if (value.length > 4) formattedValue += '-' + value.substring(4, 7); 
        if (value.length > 7) formattedValue += '-' + value.substring(7, 11);
        e.target.value = formattedValue;
    });

    // 4. 提交更新 — 修正為管理員用的 API
    document.getElementById('editMemberForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const msgDiv = document.getElementById('message');
        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        fetch(`/api/admin/members/${memberId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify(data)
        })
        .then(res => {
            if (res.ok) {
                msgDiv.textContent = "✅ 資料更新成功！";
                msgDiv.className = "success";
                msgDiv.style.display = "block";
                setTimeout(() => window.location.href = "/member/list", 1500);
            } else {
                msgDiv.textContent = "❌ 更新失敗，請檢查資料";
                msgDiv.className = "error";
                msgDiv.style.display = "block";
            }
        });
    });
</script>
</body>
</html>
