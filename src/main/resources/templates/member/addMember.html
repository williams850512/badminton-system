<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>羽球館 | 新增會員</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_green.css">
    
    <style>
        /* 保留你原本的所有 CSS 樣式 */
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f4f7f6; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 30px; max-width: 800px; margin: 50px auto; }
        .form-section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .section-title { font-size: 16px; font-weight: bold; color: #3498db; margin-bottom: 15px; display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .form-control { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; justify-content: flex-end; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .error { background: #fde2e2; color: #ea4335; }
        .success { background: #e6f4ea; color: #34a853; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom: 25px; color: #2c3e50;">🏸 新增會員資料</h2>
    
    <div id="message"></div>

    <form id="addMemberForm">
        <div class="form-section">
            <span class="section-title">帳號安全</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>會員帳號 Username</label>
                    <input type="text" name="username" class="form-control" required placeholder="請輸入帳號">
                </div>
                <div class="form-group">
                    <label>密碼 Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="請輸入密碼">
                </div>
            </div>
        </div>

        <div class="form-section">
            <span class="section-title">個人資訊</span>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>姓名 Name</label>
                    <input type="text" name="fullName" class="form-control" required placeholder="例如：王小明">
                </div>
                <div class="form-group">
                    <label>性別 Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="男" checked> 男</label>
                        <label><input type="radio" name="gender" value="女"> 女</label>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>生日 Birthday</label>
                    <input type="text" id="birthdayPicker" name="birthday" class="form-control" required readonly>
                </div>
                <div class="form-group">
                    <label>電話 Phone</label>
                    <input type="tel" id="phoneInput" name="phone" class="form-control" placeholder="09xx-xxx-xxx" maxlength="12" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>電子信箱 Email</label>
                <input type="email" name="email" class="form-control" placeholder="example@mail.com">
            </div>
        </div>

        <div class="form-section">
            <span class="section-title">權限設置</span>
            <div class="form-group">
                <label>會員等級 Membership Level</label>
                <select name="membershipLevel" id="levelSelect" class="form-control">
                    <option value="Normal" selected>👤 一般會員 (Normal)</option>
                    <option value="VIP">💎 VIP 會員 (VIP)</option>
                </select>
            </div>

            <div class="form-group">
                <label>備註 Note</label>
                <textarea name="note" class="form-control" rows="3" placeholder="請輸入備註"></textarea>
            </div>
        </div>

        <div class="btn-group">
            <a href="/member/list" class="btn btn-secondary">返回列表</a>
            <button type="submit" class="btn btn-primary">確認新增</button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>
<script>
    // 1. 初始化生日選擇器
    flatpickr("#birthdayPicker", {
        locale: "zh_tw",
        dateFormat: "Y-m-d",
        maxDate: "today"
    });

    // 2. 電話格式化
    document.getElementById('phoneInput').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, ''); 
        let formattedValue = '';
        if (value.length > 0) {
            formattedValue = value.substring(0, 4);
            if (value.length > 4) formattedValue += '-' + value.substring(4, 7);
            if (value.length > 7) formattedValue += '-' + value.substring(7, 11);
        }
        e.target.value = formattedValue;
    });

    // 3. 處理表單提交 — 修正 charset 編碼 + 導回正確路徑
    document.getElementById('addMemberForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const msgDiv = document.getElementById('message');
        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        fetch('/api/members/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify(data)
        })
        .then(async response => {
            const result = await response.text();
            if (response.ok) {
                msgDiv.textContent = "✅ 新增成功！正在導回列表...";
                msgDiv.className = "success";
                msgDiv.style.display = "block";
                setTimeout(() => window.location.href = "/member/list", 1500);
            } else {
                msgDiv.textContent = "❌ 錯誤：" + result;
                msgDiv.className = "error";
                msgDiv.style.display = "block";
            }
        })
        .catch(err => {
            console.error("Fetch error:", err);
            msgDiv.textContent = "⚠️ 伺服器連線失敗";
            msgDiv.className = "error";
            msgDiv.style.display = "block";
        });
    });
</script>
</body>
</html>
