<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    ============================================================
    場館管理 CRUD 頁面
    ============================================================
    【組員模板說明】複製這個檔案後，只需修改：
    1. head 裡的頁面標題
    2. page-header 區的標題和按鈕文字
    3. 表格的欄位（thead + tbody 渲染）
    4. Modal 表單的欄位
    5. JavaScript 裡的 API 路徑和欄位名稱
    ============================================================
-->
<head th:replace="~{layout/backend :: head('場館管理')}"></head>
<body>

    <!-- ===== Header 導覽列 ===== -->
    <nav th:replace="~{layout/backend :: header}"></nav>

    <div class="d-flex">
        <!-- ===== Sidebar 側邊欄 ===== -->
        <aside th:replace="~{layout/backend :: sidebar}"></aside>

        <!-- ===== 主內容區（只改這裡面！）===== -->
        <main class="main-content">

            <!-- 頁面標題 + 新增按鈕 -->
            <div class="page-header">
                <h2><i class="bi bi-building"></i> 場館管理</h2>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <i class="bi bi-plus-lg"></i> 新增場館
                </button>
            </div>

            <!-- 場館資料表格 -->
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="venueTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>場館名稱</th>
                                <th>地址</th>
                                <th>電話</th>
                                <th>狀態</th>
                                <th style="width: 200px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="loading-row">
                                <td colspan="6">
                                    <div class="spinner-border spinner-border-sm text-primary"></div>
                                    載入中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- ===== Footer ===== -->
    <footer th:replace="~{layout/backend :: footer}"></footer>

    <!-- ===== 新增/編輯 Modal ===== -->
    <div class="modal fade" id="venueModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增場館</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="venueForm">
                        <!-- 隱藏欄位：記錄正在編輯的 ID（新增時為空） -->
                        <input type="hidden" id="editId">

                        <div class="mb-3">
                            <label for="venueName" class="form-label">場館名稱 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="venueName"
                                   placeholder="例：大安運動中心" required>
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">地址</label>
                            <input type="text" class="form-control" id="address"
                                   placeholder="例：台北市大安區辛亥路三段382號">
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">電話</label>
                            <input type="text" class="form-control" id="phone"
                                   placeholder="例：02-2733-1369">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveVenue()">
                        <i class="bi bi-check-lg"></i> 儲存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 共用 Scripts ===== -->
    <div th:replace="~{layout/backend :: scripts}"></div>

    <!-- ===== 本頁 JavaScript（AJAX + DOM 操作）===== -->
    <script>
        // ============================================================
        // API 路徑（修改這裡就能套用到其他模組）
        // ============================================================
        const API_URL = '/api/venues';

        // Bootstrap Modal 實例
        let venueModal;

        // ============================================================
        // 頁面載入
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            venueModal = new bootstrap.Modal(document.getElementById('venueModal'));
            loadData();
        });

        // ============================================================
        // 【READ】載入所有場館
        // ============================================================
        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `
                <tr class="loading-row">
                    <td colspan="6">
                        <div class="spinner-border spinner-border-sm text-primary"></div> 載入中...
                    </td>
                </tr>`;

            try {
                const response = await fetch(API_URL);     // GET /api/venues
                const venues = await response.json();

                if (venues.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="6" class="text-center text-muted py-4">
                            目前沒有場館資料，請點擊「新增場館」按鈕
                        </td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                venues.forEach(venue => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${venue.venueId}</td>
                            <td><strong>${venue.venueName}</strong></td>
                            <td>${venue.address || '<span class="text-muted">-</span>'}</td>
                            <td>${venue.phone || '<span class="text-muted">-</span>'}</td>
                            <td>${getStatusBadge(venue.status)}</td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-primary" title="編輯"
                                            onclick='openEditModal(${JSON.stringify(venue)})'>
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-outline-danger" title="刪除"
                                            onclick="deleteVenue(${venue.venueId}, '${venue.venueName}')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                    <div class="btn-group btn-group-sm">
                                        <button class="btn btn-outline-secondary dropdown-toggle" 
                                                data-bs-toggle="dropdown" title="變更狀態">
                                            <i class="bi bi-arrow-repeat"></i>
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" href="#" 
                                                   onclick="changeStatus(${venue.venueId}, 'ACTIVE')">
                                                <i class="bi bi-check-circle text-success"></i> 營業中
                                            </a></li>
                                            <li><a class="dropdown-item" href="#" 
                                                   onclick="changeStatus(${venue.venueId}, 'MAINTENANCE')">
                                                <i class="bi bi-tools text-warning"></i> 整修中
                                            </a></li>
                                            <li><a class="dropdown-item" href="#" 
                                                   onclick="changeStatus(${venue.venueId}, 'INACTIVE')">
                                                <i class="bi bi-x-circle text-danger"></i> 停用
                                            </a></li>
                                        </ul>
                                    </div>
                                </div>
                            </td>
                        </tr>`;
                });

            } catch (error) {
                tbody.innerHTML = `
                    <tr><td colspan="6" class="text-center text-danger py-4">
                        <i class="bi bi-exclamation-triangle"></i> 載入失敗：${error.message}
                        <br><button class="btn btn-sm btn-outline-primary mt-2" onclick="loadData()">重試</button>
                    </td></tr>`;
            }
        }

        // ============================================================
        // 狀態 Badge 對應
        // ============================================================
        function getStatusBadge(status) {
            const map = {
                'ACTIVE':      '<span class="badge badge-active">營業中</span>',
                'INACTIVE':    '<span class="badge badge-inactive">已停用</span>',
                'MAINTENANCE': '<span class="badge badge-maintenance">整修中</span>'
            };
            return map[status] || `<span class="badge bg-secondary">${status}</span>`;
        }

        // ============================================================
        // 【CREATE】打開新增 Modal
        // ============================================================
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '新增場館';
            document.getElementById('venueForm').reset();   // 清空表單
            document.getElementById('editId').value = '';    // 清空 ID
            venueModal.show();
        }

        // ============================================================
        // 【UPDATE】打開編輯 Modal（帶入舊資料）
        // ============================================================
        function openEditModal(venue) {
            document.getElementById('modalTitle').textContent = '編輯場館';
            document.getElementById('editId').value = venue.venueId;
            document.getElementById('venueName').value = venue.venueName;
            document.getElementById('address').value = venue.address || '';
            document.getElementById('phone').value = venue.phone || '';
            venueModal.show();
        }

        // ============================================================
        // 【CREATE / UPDATE】儲存（根據有無 ID 判斷新增或更新）
        // ============================================================
        async function saveVenue() {
            const id = document.getElementById('editId').value;
            const data = {
                venueName: document.getElementById('venueName').value.trim(),
                address:   document.getElementById('address').value.trim(),
                phone:     document.getElementById('phone').value.trim()
            };

            // 簡易前端驗證
            if (!data.venueName) {
                alert('請輸入場館名稱！');
                return;
            }

            try {
                let response;
                if (id) {
                    // 有 ID → PUT 更新
                    response = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    // 沒 ID → POST 新增
                    response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                if (response.ok) {
                    venueModal.hide();              // 關閉 Modal
                    loadData();                     // 重新載入表格
                    alert(id ? '更新成功！' : '新增成功！');
                } else {
                    const err = await response.text();
                    alert('操作失敗：' + err);
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // ============================================================
        // 【DELETE】刪除場館
        // ============================================================
        async function deleteVenue(id, name) {
            if (!confirm(`確定要刪除「${name}」嗎？`)) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadData();                     // 重新載入表格
                    alert('刪除成功！');
                } else {
                    alert('刪除失敗');
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // ============================================================
        // 【PATCH】變更狀態
        // ============================================================
        async function changeStatus(id, newStatus) {
            try {
                const response = await fetch(`${API_URL}/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    loadData();                     // 重新載入表格
                } else {
                    alert('狀態更新失敗');
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }
    </script>

</body>
</html>
