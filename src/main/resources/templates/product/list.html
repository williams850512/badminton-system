<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    ============================================================
    商品管理 CRUD 頁面（RESTful AJAX 版）
    ============================================================
    【架構說明】依照 booking/list.html 的格式建立：
    1. 頁面由 ProductController (@Controller) 回傳此 HTML
    2. 資料透過 AJAX 向 ProductRestController (/api/products) 取得 JSON
    3. JavaScript 動態渲染表格 + Modal 表單處理 CRUD
    ============================================================
-->
<head th:replace="~{layout/backend :: head('商品管理')}"></head>
<body>

    <!-- ===== Header 導覽列 ===== -->
    <nav th:replace="~{layout/backend :: header}"></nav>

    <div class="d-flex">
        <!-- ===== Sidebar 側邊欄 ===== -->
        <aside th:replace="~{layout/backend :: sidebar}"></aside>

        <!-- ===== 主內容區 ===== -->
        <main class="main-content">

            <!-- 頁面標題 + 搜尋 + 新增按鈕 -->
            <div class="page-header">
                <h2><i class="bi bi-box-seam"></i> 商品管理</h2>
                <div class="d-flex gap-2">
                    <div class="input-group" style="width: 300px;">
                        <input type="text" class="form-control" id="searchKeyword"
                               placeholder="搜尋商品名稱、品牌...">
                        <button class="btn btn-outline-secondary" onclick="searchData()">
                            <i class="bi bi-search"></i>
                        </button>
                        <button class="btn btn-outline-danger" onclick="clearSearch()" title="清除搜尋">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <button class="btn btn-primary" onclick="openCreateModal()">
                        <i class="bi bi-plus-lg"></i> 新增商品
                    </button>
                </div>
            </div>

            <!-- 商品資料表格 -->
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="productTable">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>商品圖片</th>
                                <th>商品名稱</th>
                                <th>分類</th>
                                <th>品牌</th>
                                <th>價格</th>
                                <th>庫存</th>
                                <th>狀態</th>
                                <th style="width: 220px">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr class="loading-row">
                                <td colspan="9">
                                    <div class="spinner-border spinner-border-sm text-primary"></div>
                                    載入中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- ===== Footer ===== -->
    <footer th:replace="~{layout/backend :: footer}"></footer>

    <!-- ===== 新增/編輯 Modal ===== -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">新增商品</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <!-- 隱藏欄位：記錄正在編輯的 ID（新增時為空） -->
                        <input type="hidden" id="editId">

                        <div class="mb-3">
                            <label for="productName" class="form-label">商品名稱 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label">分類</label>
                                <select class="form-select" id="category">
                                    <option value="RACKET">球拍</option>
                                    <option value="SHUTTLECOCK">羽球</option>
                                    <option value="GRIP">握把布</option>
                                    <option value="STRING">球線</option>
                                    <option value="ACCESSORY">配件</option>
                                    <option value="OTHER">其他</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="brand" class="form-label">品牌</label>
                                <input type="text" class="form-control" id="brand"
                                       placeholder="例：YONEX、VICTOR">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="price" class="form-label">價格 <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="price"
                                       step="0.01" min="0" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="stockQty" class="form-label">庫存 <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="stockQty"
                                       min="0" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">描述</label>
                            <textarea class="form-control" id="description" rows="2"
                                      placeholder="選填商品描述"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="imageFile" class="form-label">商品圖片</label>
                            <input type="file" class="form-control" id="imageFile" accept="image/*">
                            <input type="hidden" id="imageUrl">
                            <div id="imagePreview" class="mt-2" style="display:none;">
                                <img id="previewImg" width="120" class="img-thumbnail">
                                <small class="text-muted d-block">目前圖片</small>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label">狀態</label>
                            <select class="form-select" id="status">
                                <option value="ACTIVE">上架中</option>
                                <option value="INACTIVE">已下架</option>
                                <option value="PREPARING">備貨中</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveProduct()">
                        <i class="bi bi-check-lg"></i> 儲存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 共用 Scripts ===== -->
    <div th:replace="~{layout/backend :: scripts}"></div>

    <!-- ===== 本頁 JavaScript（AJAX + DOM 操作）===== -->
    <script>
        // ============================================================
        // API 路徑
        // ============================================================
        const API_URL = '/api/products';

        // Bootstrap Modal 實例
        let productModal;

        // ============================================================
        // 頁面載入
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            productModal = new bootstrap.Modal(document.getElementById('productModal'));
            document.getElementById('searchKeyword').addEventListener('keyup', function(e) {
                if (e.key === 'Enter') searchData();
            });
            loadData();
        });

        // ============================================================
        // 【READ】載入所有商品
        // ============================================================
        async function loadData(keyword) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `
                <tr class="loading-row">
                    <td colspan="9">
                        <div class="spinner-border spinner-border-sm text-primary"></div> 載入中...
                    </td>
                </tr>`;

            try {
                const response = await fetch(API_URL);
                let products = await response.json();

                // 前端模糊篩選
                if (keyword) {
                    const kw = keyword.toLowerCase();
                    products = products.filter(p => {
                        const name = (p.productName || '').toLowerCase();
                        const brand = (p.brand || '').toLowerCase();
                        const cat = getCategoryLabel(p.category).toLowerCase();
                        const status = (p.status || '').toLowerCase();
                        return name.includes(kw) || brand.includes(kw)
                            || cat.includes(kw) || status.includes(kw);
                    });
                }

                if (products.length === 0) {
                    tbody.innerHTML = `
                        <tr><td colspan="9" class="text-center text-muted py-4">
                            目前沒有商品資料，請點擊「新增商品」按鈕
                        </td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                products.forEach(product => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${product.productId}</td>
                            <td>
                                <img src="${product.imageUrl ? product.imageUrl : '/images/products/default.png'}"
                                     width="80" class="img-thumbnail"
                                     onerror="this.onerror=null; this.src='/images/products/default.png';">
                            </td>
                            <td><strong>${product.productName || ''}</strong></td>
                            <td>${getCategoryLabel(product.category)}</td>
                            <td>${product.brand || '<span class="text-muted">-</span>'}</td>
                            <td>$${Number(product.price || 0).toLocaleString()}</td>
                            <td>${product.stockQty != null ? product.stockQty : '-'}</td>
                            <td>${getStatusBadge(product.status)}</td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-primary" title="編輯"
                                            onclick='openEditModal(${JSON.stringify(product)})'>
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn btn-outline-danger" title="刪除"
                                            onclick="deleteProduct(${product.productId})">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                    <div class="btn-group btn-group-sm">
                                        <button class="btn btn-outline-secondary dropdown-toggle"
                                                data-bs-toggle="dropdown" title="變更狀態">
                                            <i class="bi bi-arrow-repeat"></i>
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" href="#"
                                                   onclick="changeStatus(${product.productId}, 'ACTIVE')">
                                                <i class="bi bi-check-circle text-success"></i> 上架中
                                            </a></li>
                                            <li><a class="dropdown-item" href="#"
                                                   onclick="changeStatus(${product.productId}, 'INACTIVE')">
                                                <i class="bi bi-x-circle text-danger"></i> 已下架
                                            </a></li>
                                            <li><a class="dropdown-item" href="#"
                                                   onclick="changeStatus(${product.productId}, 'PREPARING')">
                                                <i class="bi bi-clock text-warning"></i> 備貨中
                                            </a></li>
                                        </ul>
                                    </div>
                                </div>
                            </td>
                        </tr>`;
                });

            } catch (error) {
                tbody.innerHTML = `
                    <tr><td colspan="9" class="text-center text-danger py-4">
                        <i class="bi bi-exclamation-triangle"></i> 載入失敗：${error.message}
                        <br><button class="btn btn-sm btn-outline-primary mt-2" onclick="loadData()">重試</button>
                    </td></tr>`;
            }
        }

        // ============================================================
        // 分類中文對應
        // ============================================================
        function getCategoryLabel(category) {
            const map = {
                'RACKET': '球拍', 'SHUTTLECOCK': '羽球', 'GRIP': '握把布',
                'STRING': '球線', 'ACCESSORY': '配件', 'OTHER': '其他'
            };
            return map[category] || category || '<span class="text-muted">-</span>';
        }

        // ============================================================
        // 狀態 Badge 對應
        // ============================================================
        function getStatusBadge(status) {
            const map = {
                'ACTIVE':    '<span class="badge badge-active">上架中</span>',
                'INACTIVE':  '<span class="badge badge-inactive">已下架</span>',
                'PREPARING': '<span class="badge bg-warning text-dark">備貨中</span>'
            };
            return map[status] || `<span class="badge bg-secondary">${status}</span>`;
        }

        // ============================================================
        // 【CREATE】打開新增 Modal
        // ============================================================
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '新增商品';
            document.getElementById('productForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('imageUrl').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            productModal.show();
        }

        // ============================================================
        // 【UPDATE】打開編輯 Modal（帶入舊資料）
        // ============================================================
        function openEditModal(product) {
            document.getElementById('modalTitle').textContent = '編輯商品';
            document.getElementById('editId').value = product.productId;
            document.getElementById('productName').value = product.productName || '';
            document.getElementById('category').value = product.category || '';
            document.getElementById('brand').value = product.brand || '';
            document.getElementById('price').value = product.price || '';
            document.getElementById('stockQty').value = product.stockQty || '';
            document.getElementById('description').value = product.description || '';
            document.getElementById('status').value = product.status || 'ACTIVE';
            document.getElementById('imageUrl').value = product.imageUrl || '';
            document.getElementById('imageFile').value = '';

            // 顯示目前圖片預覽
            if (product.imageUrl) {
                document.getElementById('previewImg').src = product.imageUrl;
                document.getElementById('imagePreview').style.display = 'block';
            } else {
                document.getElementById('imagePreview').style.display = 'none';
            }

            productModal.show();
        }

        // ============================================================
        // 【CREATE / UPDATE】儲存（根據有無 ID 判斷新增或更新）
        // ============================================================
        async function saveProduct() {
            const id = document.getElementById('editId').value;

            // 簡易前端驗證
            if (!document.getElementById('productName').value.trim()) {
                alert('請輸入商品名稱！');
                return;
            }

            // ===== 步驟 1：如果有選擇圖片，先上傳 =====
            let imageUrl = document.getElementById('imageUrl').value;
            const imageFile = document.getElementById('imageFile').files[0];

            if (imageFile) {
                const formData = new FormData();
                formData.append('image', imageFile);

                try {
                    const uploadRes = await fetch(`${API_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    if (uploadRes.ok) {
                        const result = await uploadRes.json();
                        imageUrl = result.imageUrl;
                    } else {
                        alert('圖片上傳失敗！');
                        return;
                    }
                } catch (error) {
                    alert('圖片上傳失敗：' + error.message);
                    return;
                }
            }

            // ===== 步驟 2：儲存商品資料 =====
            const data = {
                productName: document.getElementById('productName').value.trim(),
                category:    document.getElementById('category').value || null,
                brand:       document.getElementById('brand').value.trim() || null,
                price:       parseFloat(document.getElementById('price').value) || 0,
                stockQty:    parseInt(document.getElementById('stockQty').value) || 0,
                description: document.getElementById('description').value.trim() || null,
                status:      document.getElementById('status').value,
                imageUrl:    imageUrl || null
            };

            try {
                let response;
                if (id) {
                    response = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }

                if (response.ok) {
                    productModal.hide();
                    loadData();
                    alert(id ? '更新成功！' : '新增成功！');
                } else {
                    const err = await response.text();
                    alert('操作失敗：' + err);
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // ============================================================
        // 【DELETE】刪除商品
        // ============================================================
        async function deleteProduct(id) {
            if (!confirm(`確定要刪除商品 #${id} 嗎？`)) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadData();
                    alert('刪除成功！');
                } else {
                    alert('刪除失敗');
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // ============================================================
        // 【PATCH】變更狀態
        // ============================================================
        async function changeStatus(id, newStatus) {
            try {
                const response = await fetch(`${API_URL}/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    loadData();
                } else {
                    alert('狀態更新失敗');
                }
            } catch (error) {
                alert('請求失敗：' + error.message);
            }
        }

        // ============================================================
        // 【SEARCH】模糊搜尋
        // ============================================================
        function searchData() {
            const keyword = document.getElementById('searchKeyword').value.trim();
            loadData(keyword || null);
        }

        function clearSearch() {
            document.getElementById('searchKeyword').value = '';
            loadData();
        }
    </script>

</body>
</html>
