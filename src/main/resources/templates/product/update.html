<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/backend :: head('修改商品')}"></head>
<body>

    <!-- ===== Header 導覽列 ===== -->
    <nav th:replace="~{layout/backend :: header}"></nav>

    <div class="d-flex">
        <!-- ===== Sidebar 側邊欄 ===== -->
        <aside th:replace="~{layout/backend :: sidebar}"></aside>

        <!-- ===== 主內容區 ===== -->
        <main class="main-content">
            <div class="page-header">
                <h2><i class="bi bi-pencil-square"></i> 修改商品</h2>
            </div>

            <div class="content-body">
                <div class="card shadow-sm border-0 p-4" style="max-width: 800px;">
                    <form th:action="@{/product/edit}" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="productId" th:value="${product.productId}">

                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">商品名稱 <span class="text-danger">*</span></label>
                            <div class="col-sm-10">
                                <input class="form-control" type="text" name="productName" th:value="${product.productName}" required>
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">分類 <span class="text-danger">*</span></label>
                            <div class="col-sm-10">
                                <input class="form-control" type="text" name="category" th:value="${product.category}" required>
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">品牌</label>
                            <div class="col-sm-10">
                                <input class="form-control" type="text" name="brand" th:value="${product.brand}">
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">價格 <span class="text-danger">*</span></label>
                            <div class="col-sm-10">
                                <input class="form-control" type="number" step="0.01" name="price" th:value="${product.price}" required>
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">庫存 <span class="text-danger">*</span></label>
                            <div class="col-sm-10">
                                <input class="form-control" type="number" name="stockQty" th:value="${product.stockQty}" required>
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">描述</label>
                            <div class="col-sm-10">
                                <textarea class="form-control" name="description" rows="3" th:text="${product.description}"></textarea>
                            </div>
                        </div>

                        <div class="mb-3 row align-items-center">
                            <label class="col-sm-2 col-form-label">目前圖片</label>
                            <div class="col-sm-10">
                                <img class="img-thumbnail" 
                                     th:src="${product.imageUrl != null && product.imageUrl.startsWith('/') ? product.imageUrl : '/' + (product.imageUrl ?: 'images/products/default.png')}" 
                                     width="150"
                                     onerror="this.onerror=null; this.src='/images/products/default.png';">
                                <input type="hidden" name="imageUrl" th:value="${product.imageUrl}">
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">重新上傳</label>
                            <div class="col-sm-10">
                                <input class="form-control" type="file" name="image" accept="image/*">
                            </div>
                        </div>

                        <div class="mb-3 row">
                            <label class="col-sm-2 col-form-label">狀態</label>
                            <div class="col-sm-10">
                                <select class="form-select" name="status">
                                    <option value="active" th:selected="${product.status == 'active'}">上架 (active)</option>
                                    <option value="inactive" th:selected="${product.status == 'inactive'}">下架 (inactive)</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4 pt-3 border-top">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 確認修改</button>
                            <a class="btn btn-outline-secondary" th:href="@{/product/list}">取消返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- ===== Footer ===== -->
    <footer th:replace="~{layout/backend :: footer}"></footer>

    <!-- ===== 共用 Scripts ===== -->
    <div th:replace="~{layout/backend :: scripts}"></div>
</body>
</html>
